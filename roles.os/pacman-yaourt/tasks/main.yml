---
# TODO https://archlinux.fr/yaourt-en

# AUR
- name: Install yaourt packages
  yaourt:
    name: "{{ item.name | default(item) }}"
    state: "{{ item.state | default(omit) }}"
  with_items: "{{ pacman_yaourt_packages }}"
  # become: "{{ 'yes' if ansible_os_family != 'Darwin' else 'no' }}"
  when: packages_install
