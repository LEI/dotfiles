---
dependencies:

  - role: package
    packages:
      - i3
      - rofi
      - scrot

  - role: pacman-yaourt
    pacman_yaourt_packages:
      - i3blocks

  - role: dotfiles
    paths:
      - name: i3
        role_dir: roles.os
        dest: .config/i3
        pattern: "config"
      - name: home
        # role_dir: roles.os
        src: "{{ dot_root }}/roles.os/i3/files"
        pattern: "*.conf"
        prefix: .
      - name: xresources
        # role_dir: roles.os
        src: "{{ dot_root }}/roles.os/i3/files/Xresources.d"
        dest: .Xresources.d
