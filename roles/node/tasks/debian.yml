---
# Install Node.js using packages crafted by NodeSource
# https://github.com/nodesource/ansible-nodejs-role

# - name: Ensure the system can use the HTTPS transport for apt
#   stat:
#     path: /usr/lib/apt/methods/https
#   register: apt_https_transport

# - name: Install HTTPS transport for apt
#   apt:
#     pkg: apt-transport-https
#     state: installed
#     # force: yes
#   when: not apt_https_transport.stat.exists
#   become: yes

- name: Import the NodeSource GPG key into apt
  apt_key:
    url: https://deb.nodesource.com/gpgkey/nodesource.gpg.key
    state: present
  become: yes

- name: Add NodeSource repositories
  apt_repository:
    repo: "{{ item }}"
    state: present
  with_items:
    - "deb https://deb.nodesource.com/node_{{ node_debian_repo_version }} {{ ansible_distribution_release }} main"
    - "deb-src https://deb.nodesource.com/node_{{ node_debian_repo_version }} {{ ansible_distribution_release }} main"
  failed_when: "ansible_distribution_release == 'NA'"
  become: yes

# - name: Add NodeSource repository preferences
#   template:
#     src: etc/apt/preferences.d/deb_nodesource_com_node.pref.j2
#     dest: /etc/apt/preferences.d/deb_nodesource_com_node.pref
#   become: yes

- name: Install NodeJS and npm
  apt:
    # pkg: nodejs={{ node_version }}*
    name: nodejs={{ node_version | regex_replace('\.x$', '') }}*
    state: present
    update_cache: yes
  become: yes
