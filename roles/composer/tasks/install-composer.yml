---
- name: Download Composer installer
  get_url:
    url: https://getcomposer.org/installer
    dest: "{{ tpm_dir }}composer-setup.php"
    mode: 0755

- name: Run Composer installer
  shell: "{{ php_executable }} composer-setup.php {% if composer_version != '' %} --version={{ composer_version }}{% endif %}"
  args:
    chdir: "{{ tmp_dir }}"

- name: Move Composer to be accessed globally
  shell: "mv {{ tmp_dir }}composer.phar {{ composer_path }}"
  args:
    creates: "{{ composer_path }}"
