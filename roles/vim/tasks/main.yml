---
- name: Ensure vim is installed on OSX
  homebrew:
    name: vim
    state: present
    install_options: with-override-system-vi
  when: "ansible_os_family == 'Darwin'"

- name: Make sure .vim/autoload directory exists
  file:
    path: "{{ dot_home }}/.vim/autoload"
    state: directory
    follow: true
  tags: vim-plug

- name: Install vim-plug
  get_url:
    url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    dest: "{{ dot_home }}/.vim/autoload/plug.vim"
  tags: vim-plug

# g:plug_timeout?
- name: Install vim plugins
  command: "vim +PlugInstall +qall"
  args:
    creates: "{{ false if vim_update_plugins else dot_home + '/.vim/plugged/*' }}"
  # command: "vim -E -s +'source {{ destination }}/vimrc' +PlugInstall +qall"
  # args:
  #   creates:  "{{ destination }}/plugged/*"
  # register: vim_plug_output
  # changed_when: >
  #   vim_plug_output.stdout != '' or
  #   vim_plug_output.stderr != ''
  # failed_when: vim_plug_output.rc != 0
  when: vim_install_plugins
  tags: vim-plug

