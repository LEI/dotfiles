---
dependencies:

  - role: package
    packages:
      - name: vim
        install_options: "{{ osx_vim_install_options | join(',') if ansible_os_family == 'Darwin' and osx_vim_install_options | length > 0 else omit }}"
    # when: "ansible_os_family != 'Darwin'"

  - role: dot.symlink
    dot_files:
      vim:
        dest: .vim
