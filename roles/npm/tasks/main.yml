---
- name: Get npm configuration prefix
  shell: "npm config get prefix"
  register: npm_prefix
  changed_when: false

# docs.npmjs.com/getting-started/fixing-npm-permissions
- name: "Check {{ npm_prefix.stdout }}/lib/node_modules permissions"
  file:
    path: "{{ npm_prefix.stdout }}/lib/node_modules"
    owner: "{{ ansible_user_id }}"
    # recurse: yes
  when: npm_prefix.stdout is defined

- name: "Install node packages{{ ' globally' if npm_global else '' }}"
  npm:
    name: "{{ item.name|default(item) }}"
    state: "{{ item.state|default(npm_state) }}"
    global: "{{ item.global|default(npm_global) }}"
    # path: ~/.node_modules
  with_items: "{{ npm_packages }}"
  when: npm_install
  # become: yes
