#   changed_when: false

# - name: "Check {{ npm_prefix.stdout }}/lib/node_modules permissions"
#   file:
#     path: "{{ npm_prefix.stdout }}/lib/node_modules"
#     owner: "{{ ansible_user_id }}"
#     # recurse: yes
#   when: npm_prefix.stdout is defined

- name: "Install npm packages"
  npm:
    name: "{{ item.name | default(item) }}"
    version: "{{ item.version | default('') }}"
    global: "{{ item.global | default(npm_global) }}"
    state: "{{ item.state | default(npm_state) }}"
    # path: ~/.node_modules
  with_items: "{{ npm_packages }}"
  when: npm_install
  become: "{{ 'yes' if ansible_os_family == 'Debian' else 'no' }}"
