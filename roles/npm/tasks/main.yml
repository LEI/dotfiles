- name: "Install npm packages"
  npm:
    name: "{{ item.name|default(item) }}"
    state: "{{ item.state|default(npm_state) }}"
    global: "{{ item.global|default(npm_global) }}"
    # path: ~/.node_modules
  with_items: "{{ npm_packages }}"
  when: "npm_install and ansible_distribution == 'Darwin'"
