---
dependencies:

  # MacOSX
  - role: package
    packages:
      - node
    when: "ansible_os_family == 'Darwin'"

  # Arch
  - role: package
    packages:
      - nodejs
      - npm
    when: "ansible_os_family == 'Archlinux'"

  # Debian/RedHat
  - role: node
    when: "ansible_os_family == 'Debian'"

  - role: template
    dot_files:
      npm:
        prefix: .

  - role: symlink
    dot_files:
      npm:
        prefix: .
