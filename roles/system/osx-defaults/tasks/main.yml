---
# https://github.com/SummitRoute/osxlockdown/blob/master/commands.yaml

- name: OS X Preferences
  osx_pref:
    key: "{{ item.key }}"
    value: "{{ item.value | default(omit) }}" # Required when action=set
    domain: "{{ item.domain | default(omit) }}" # NSGlobalDomain
    action: "{{ item.action | default(omit) }}" # get, set
    dict_set_method: "{{ item.dict_set_method | default(omit) }}" # merge, replace
  with_items: "{{ osx_prefs }}"
  register: osx_pref_output
  # notify: "{{ 'killall ' + item.notify | default(omit) }}"

