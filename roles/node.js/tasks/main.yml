---
- include: installed.yml

- include: debian.yml
  when: ansible_os_family == 'Debian' and
    (node_force_install or not node_installed)

- include: redhat.yml
  when: ansible_os_family == 'RedHat' and
    (node_force_install or not node_installed)

- fail:
    msg: NodeJS is not installed
  when: os == 'Windows' and not node_installed
