---
bash_packages: []

bash_dirname: .bash.d
bash_dir: "{{ dot_home }}/{{ bash_dirname }}"

# TODO #!/usr/bin/env bash for OS X
# bash_lines:
#   # Source ~/.bash.d/init.bash from ~/.bashrc
#   - dest: "{{ dot_home }}/.bashrc"
#     line: source "$HOME/{{ bash_dirname }}/init.bash"
#   # Source ~/.bashrc from ~/.bash_profile
#   - dest: "{{ dot_home }}/.bash_profile"
#     line: [[ -f ~/.bashrc ]] && [[ -r ~/.bashrc ]] && [[ -n "$PS1" ]] && source ~/.bashrc
bash_blocks:
  # Source ~/.bash.d/init.bash from ~/.bashrc
  - dest: "{{ dot_home }}/.bashrc"
    block: |
      source "$HOME/{{ bash_dirname }}/init.bash"
  # Source ~/.bashrc from ~/.bash_profile
  - dest: "{{ dot_home }}/.bash_profile"
    block: |
      if [[ -f ~/.bashrc ]] && [[ -r ~/.bashrc ]]; then
        [[ -n "$PS1" ]] && source ~/.bashrc
      fi

bash_urls:
  - url: "https://raw.githubusercontent.com/holman/spark/master/spark"
    dest: "{{ dot_home }}/bin/spark"
    # mode: u=rwx,g=rx,o=rx
    mode: u+x # 0755
