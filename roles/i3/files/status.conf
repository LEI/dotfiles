# i3status configuration file
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

# Font Awesome: http://fontawesome.io/cheatsheet/

general {
        # color_bad = ""
        # color_degraded = ""
        # color_good = ""
        # color_separator = ""
        colors = true
        interval = 1
        output_format = i3bar
}

# order += "ipv6"
# order += "run_watch DHCP"
# order += "run_watch VPN"
order += "wireless _first_"
order += "ethernet _first_"
order += "load"
order += "cpu_usage"
order += "disk /"
order += "battery 0"
order += "volume master"
order += "tztime local"

disk "/" {
        format = " %avail"
}

ethernet _first_ {
        # if you use %speed, i3status requires root privileges
        # format_up = "E: %ip (%speed)"
        # format_up = " eth0   %quality  %essid   %bitrate  %ip"
        format_up = " %ip (%speed)"
        format_down = ""
}

wireless _first_ {
        # format_up = "W: (%quality at %essid) %ip"
        # format_up = " wlan  %quality  %essid   %bitrate  %ip"
        format_up = " %ip (%quality  %speed)"
        # format_down = "wlan0 "
        format_down = ""
}

battery 0 {
        # plug: 
        # battery empty 
        # battery quarter 
        # battery full 
        format = " %percentage"
        # format = "%status %percentage %remaining"
        # last_full_capacity = true
        integer_battery_capacity = true
}

run_watch DHCP {
        pidfile = "/var/run/dhclient*.pid"
}


run_watch VPN {
        pidfile = "/var/run/vpnc/pid"
}

volume master {
        format = " %volume"
        format_muted = " %volume"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
}

cpu_usage {
        format = " %usage"
}

cpu_temperature 0 {
        format = " %degrees °C"
        path = "/sys/devices/platform/coretemp.0/temp1_input"
        # max_threshold = "65"
}

load {
        format = " %1min"
}

tztime local {
        # format = "%Y-%m-%d %H:%M:%S"
        format = " %a, %d %b %H:%M:%S"
}
