---
dependencies:

  - role: package
    packages:
      - i3 # window manager
      - rofi # window switcher
      - scrot # screenshot utility
      - ttf-hack
      - xorg-xinit
      - xorg-server
      # - xorg-server-utils
      # - gnome-themes-standard # (gtk warning)

  - role: pacman-yaourt
    pacman_yaourt_packages:
      # - i3blocks
      - arc-firefox-theme
      - arc-icon-theme
      - gtk-theme-arc
      - system-san-francisco-font-git
      - ttf-font-awesome

  - role: dotfiles
    paths:
      - name: i3
        dest: .config/i3
        pattern:
          - bin
          - config
          - "*.conf"
      - name: i3/files/Xresources.d
        # src: roles/i3/files/Xresources.d
        dest: .Xresources.d
