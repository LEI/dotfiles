---
dependencies:

  - role: package
    packages:
      - i3 # window manager
      - rofi # window switcher
      - scrot # screenshot utility
      # - gtk-theme-arc #-git

  # - role: pacman-yaourt
  #   pacman_yaourt_packages:
  #     - i3blocks

  - role: dotfiles
    paths:
      - name: i3
        dest: .config/i3
        pattern: "config"
      - name: i3
        pattern: "*.conf"
        prefix: .
      - name: i3/files/Xresources.d
        # src: roles/i3/files/Xresources.d
        dest: .Xresources.d
