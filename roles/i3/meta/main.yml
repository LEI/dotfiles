---
dependencies:

  - role: package
    packages: "{{ i3_packages }}"

  # - role: pacman-yaourt
  #   pacman_yaourt_packages:
  #     - i3blocks # Not available on ALARM
  #   when: "{{ ansible_os_family == 'Archlinux' }}"

  - role: dotfiles
    paths:
      - name: i3
        dest: .config/i3
        pattern:
          - bin
          - config
          - "*.conf"
      - name: i3/files/Xresources.d
        # src: roles/i3/files/Xresources.d
        dest: .Xresources.d
