---
- include: targets.yml

- name: Check symlink destination
  stat:
    path: "{{ destination }}{{ prefix|default('') }}{{ item }}"
    follow: false
  register: backup_files
  with_items: "{{ files }}"
  when: enable_backup
  # failed_when: false

- include: backups.yml
  when: enable_backup

