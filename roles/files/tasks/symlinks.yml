#     state: link
#   with_items: "{{ symlinks }}"

# Source relative to dot_root, destination relative to dot_home
- name: Create symbolic links
  file:
    src: "{{ source }}{{ item.src|default(item)|basename }}"
    dest: "{{ destination }}{{ prefix|default('') }}{{ item.dst|default(item)|basename }}"
    state: link
  with_items: "{{ files }}"
  # fail_when;: false

