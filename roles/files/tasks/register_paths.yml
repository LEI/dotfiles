---
- name: Register paths
  set_fact:
    source: "{{ dot_root }}/{{ paths.src + '/' if paths.src else '' }}"
    destination: "{{ dot_home }}/{{ paths.dst + '/' if paths.dst else '' }}"

- name: Ensure target directories exist
  file:
    path: "{{ item }}"
    state: directory
  with_items:
    - "{{ source }}"
    - "{{ destination }}"
