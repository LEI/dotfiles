---
# - debug: var=vars[directory]

- name: "Register {{ role_dir }} source and destination"
  set_fact:
    prefix: "{{ vars[directory]['prefix'] | default('') }}"
    source: "{{ dot_root }}{{ '/' if vars[directory]['src'] is defined and vars[directory]['src'] else '' }}{{ vars[directory]['src'] | default('/roles/' + role_dir + '/' + directory) | default('') }}"
    destination: "{{ dot_home }}{{ '/' if vars[directory]['dest'] is defined and vars[directory]['dest'] else '' }}{{ vars[directory]['dest'] | default('') }}"

- assert:
    that:
      - "source != inventory_dir"

- name: "Ensure {{ role_dir }} targets exists"
  file:
    path: "{{ item }}"
    state: directory
    follow: true
  with_items:
    - "{{ source }}"
    - "{{ destination }}"

