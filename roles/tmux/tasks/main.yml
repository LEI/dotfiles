---
# github.com/mjanser/ansible-role-tmux

- include: osx.yml
  when: ansible_os_family == 'Darwin'

- include: debian.yml
  when: ansible_os_family == 'Debian'

- include: ../../files/tasks/templates.yml

- include: ../../files/tasks/symlinks.yml

- name: Source ~/.tmux/tmux.conf from ~/.tmux.conf
  lineinfile:
    dest: "{{ dot_home }}/.tmux.conf"
    line: "source ~/.tmux/tmux.conf"
    create: yes
  # become: yes
  # become_user: "{{ item }}"
  # when: item in home_dirs.stdout_lines
  # with_items: "{{ tmux_users }}"

- name: Create .tmux/plugins directory
  file:
    path: "{{ destination }}plugins"
    state: directory

- name: Clone tmux plugin manager
  git:
    repo: https://github.com/tmux-plugins/tpm.git
    dest: "{{ destination }}plugins/tpm"

