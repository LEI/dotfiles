---
# github.com/mjanser/ansible-role-tmux

# ! https://github.com/tmux-plugins/tpm

# ? https://github.com/edkolev/tmuxline.vim

# github.com/tmux/tmux/blob/master/example_tmux.conf
# github.com/demure/dotfiles/blob/master/tmux.conf
# github.com/tangledhelix/dotfiles/blob/master/tmux.conf
#
# Seamless tmux/vim navigation?
# https://github.com/christoomey/vim-tmux-navigator
# https://gist.github.com/mislav/5189704

# https://github.com/alexanderjeurissen/dotfiles

- name: Ensure ~/.tmux.conf exists
  copy:
    content: ""
    dest: "{{ dot_home }}/.tmux.conf"
    force: no
  when: tmux_conf

- name: Ensure ~/.tmux.conf is sourcing ~/.tmux/tmux.conf
  lineinfile:
    dest: "{{ dot_home }}/.tmux.conf"
    line: "source {{ dot_home }}/.tmux/tmux.conf"
    backup: yes
    create: yes
    state: present
  # become: yes
  # become_user: "{{ item }}"
  # when: item in home_dirs.stdout_lines
  # with_items: "{{ tmux_users }}"
  when: tmux_conf

- name: Ensure .tmux/plugins directory exists
  file:
    path: "{{ dot_home }}/.tmux/plugins"
    state: directory
    follow: true
  when: tmux_conf and tmux_plugin_manager
  tags: [tpm]

- name: Clone tmux plugin manager
  git:
    repo: https://github.com/tmux-plugins/tpm.git
    dest: "{{ dot_home }}/.tmux/plugins/tpm"
  when: tmux_conf and tmux_plugin_manager
  tags: [tpm]

# github.com/tmux-plugins/tpm/blob/master/docs/managing_plugins_via_cmd_line.md
- name: "Install {{ tmux_plugins | length }} tmux plugins"
  command: "{{ dot_home }}/.tmux/plugins/tpm/bin/install_plugins"
  environment:
    TMUX_PLUGIN_MANAGER_PATH: "{{ dot_home }}/.tmux/plugin"
  args:
    # if tmux_plugins | length > 0 else false
    creates: "{{ dot_home }}/.tmux/plugins/{{ tmux_plugins[tmux_plugins | length - 1] | basename }}"
  when: >
    tmux_conf and tmux_plugin_manager and
    tmux_install_plugins and tmux_plugins | length > 0
  tags: [tpm]
