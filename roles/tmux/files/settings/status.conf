# Title and status bar format
# Example status left format: '#{=21:pane_title} %H:%M %d-%b-%y'

# Prefix highlight
set-environment -g 'TMUX_COLOR_PREFIX' '#[default,#{?client_prefix,reverse,none}]'
# set-environment -g 'TMUX_COLOR_PREFIX' '#[fg=default,bg=brightblack,#{?client_prefix,reverse,none}]'
# run-shell 'tmux set-environment -g "TMUX_COLOR_PREFIX" "$(echo '#[default,#{?client_prefix,reverse,none}]'
set-environment -g 'TMUX_COLOR_RESET' '#[fg=brightyellow,bg=default,none]'

# Terminal title
set-option -g set-titles on

# Example title format: '#S #I.#P #W #T'
# #H  Hostname of local host
# #I  Current window index
# #P  Current pane index
# #S  Session name
# #T  Current window title
# #W  Current window name
set-option -g set-titles-string '#S #W #T #{session_alerts}'

#
# Status
#

set-option -g status on
set-option -g status-interval 3

# Alignment: left, centre, right
set-option -g status-justify left
set-option -g status-position bottom

# set-option -g status-keys vi # emacs

# Left status

set-window-option -g status-left ''
set-option -g status-left-length 20
set-window-option -ga status-left '#(echo $TMUX_COLOR_PREFIX)'
# Session name
set-window-option -ga status-left ' #S '
set-window-option -ga status-left '#(echo $TMUX_COLOR_RESET)'
# Window and pane index
# set-window-option -ga status-left ' #I.#P '
set-window-option -ga status-left '#[default] '

# Window status

# Window name format
# setw -g window-status-format '#[fg=brightblack] #I#[fg=default]#{?window_flags,#F, }#[fg=brightblack]#W '
set-window-option -g window-status-format ' #I#{?window_flags,#F, }#W '
# Current window format
# setw -g window-status-current-format '#[fg=brightblack] #I#[fg=default]#{?window_flags,#F, }#[fg=white]#W '
set-window-option -g window-status-current-format ' #I#{?window_flags,#F, }#W '

# Right status

set-window-option -g status-right ''
set-option -g status-right-length 80
set-window-option -ga status-right '#(echo $TMUX_COLOR_RESET)'
# Host name (%H)
set-window-option -ga status-right ' #h '
# Cf. ~/bin/tmux-status
set-window-option -ga status-right '#(tmux-status "(" ") ")'
set-window-option -ga status-right '#(echo $TMUX_COLOR_PREFIX)'
# Date (%D) and time (%H:%M)
set-window-option -ga status-right ' %a %d %b %R '


