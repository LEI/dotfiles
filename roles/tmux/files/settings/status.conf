# Title and status bar format
# Example status left format: '#{=21:pane_title} %H:%M %d-%b-%y'

# Terminal title
set-option -g set-titles on

# Example title format: '#S #I.#P #W #T'
# #H  Hostname of local host
# #I  Current window index
# #P  Current pane index
# #S  Session name
# #T  Current window title
# #W  Current window name
set-option -g set-titles-string '#S #W #T #{session_alerts}'

#
# Status
#

set-option -g status on
set-option -g status-interval 3

# Alignment: left, centre, right
set-option -g status-justify left
set-option -g status-position bottom

# set-option -g status-keys vi # emacs

# Maximum length
set-option -g status-left-length 20
set-option -g status-right-length 80

# source-file ~/.tmux/colors/solarized-light.conf

# Customize left and right status style (yellow, brightred?)
set-option -g status-left-style fg=green
set-option -g status-right-style fg=green

# Window name format
set-window-option -g window-status-format ' #I#{?window_flags,#F, }#W '
# Current window format
set-window-option -g window-status-current-format ' #I#{?window_flags,#F, }#W '

# Left status

set-window-option -g status-left ''
# Reverse when prefix is active
set-window-option -ga status-left '#[#{?client_prefix,reverse,default}]'
# Session name
set-window-option -ga status-left ' #S '
# Window and pane index
# set-window-option -ga status-left ' #I.#P '
# Reset status style
set-window-option -ga status-left '#[default] '

# Right status

set-window-option -g status-right ''
# Low contrast text
set-window-option -ga status-right '#[fg=brightyellow,bg=default,none]'
# Host name (%H)
set-window-option -ga status-right ' #h '
# Public IP
set-window-option -ga status-right '[#(dig +short myip.opendns.com @resolver1.opendns.com || curl -s ipecho.net/plain)] '
# Reset and reverse when prefix is active
set-window-option -ga status-right '#[default,#{?client_prefix,reverse,none}]'
# Date (%D) and time (%H:%M)
set-window-option -ga status-right ' %a %d %b %R '


