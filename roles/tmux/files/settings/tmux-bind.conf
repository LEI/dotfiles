# Bindings

# Use vi or emacs-style key bindings in the status line
set-option -g status-keys emacs

# Use vi or emacs-style key bindings in copy and choice modes
set-window-option -g mode-keys vi

# Change the default prefix binding to Ctrl-a
if-shell '[[ -z "$SSH_TTY" ]]' 'set -g prefix C-a'
if-shell '[[ -z "$SSH_TTY" ]]' 'bind C-a send-prefix'
if-shell '[[ -z "$SSH_TTY" ]]' 'unbind C-b'

# Reload config
bind r source-file ~/.tmux.conf \; display-message 'Reloaded ~/.tmux.conf'

# Switch to last window
bind a last-window

# Open new window and splits in the same directory
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Vim style pane navigation
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key h
bind-key h select-pane -L
unbind-key l
bind-key l select-pane -R

# Vim style pane resizing
bind H resize-pane -L 15
bind J resize-pane -D 15
bind K resize-pane -U 15
bind L resize-pane -R 15

# Quick pane cycling
# unbind ^A
# bind ^A select-pane -t :.+

# Move current window to left or right
# Ctrl+Shift+Left (-n C-S-Left)
bind-key S-Left swap-window -t -1
bind-key S-Right swap-window -t +1

# Flip the orientation of the current pane with the pane before it
# -n passes the keystrokes through tmux
bind -n M-f move-pane -t '.-'
bind M-f move-pane -t '.-'
bind -n M-r move-pane -h -t '.-'
bind M-r move-pane -h -t '.-'

# Some extra key bindings to select higher numbered windows
bind F1 selectw -t:10
bind F2 selectw -t:11
bind F3 selectw -t:12
bind F4 selectw -t:13
bind F5 selectw -t:14
bind F6 selectw -t:15
bind F7 selectw -t:16
bind F8 selectw -t:17
bind F9 selectw -t:18
bind F10 selectw -t:19
bind F11 selectw -t:20
bind F12 selectw -t:21
