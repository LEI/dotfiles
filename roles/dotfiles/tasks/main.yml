- name: Init
  set_fact:
    dot_paths: []

- name: Prepare
  set_fact:
    dot_paths: >
      {{ dot_paths + [
        {
          'state': 'template' if item.template is defined and item.template else item.state | default('link'),
          'items': lookup('dotfile',
            item.src if item.src is defined else item.name | default(item.name | default(item)) + '/' + item.dir | default('templates' if item.template is defined and item.template else 'files') + ',' + (item.role_dir if item.role_dir is defined else ''),
            item.pattern | default('*'),
            {
              'dest': item.dest | default(false),
              'prefix': item.prefix | default(''),
              'substr': item.substr | default('.j2'),
              },
            wantlist=True),
        }
      ]}}
  with_items: "{{ paths }}"
  # with_fileglob: "{{ dot_paths | map(attribute='src') | list }}"

- name: Action
  action: "{{ 'file' if item.0.state in ['link','touch','absent','present'] else item.0.state }}"
  args:
    src: "{{ item.1.path}}"
    dest: "{{ item.1.dest }}"
    state: "{{ item.0.state if item.0.state != 'template' else omit }}"
    # backup: "{{ 'yes' if dot_backup_enable and dot_backup_templates else 'no' }}"
    # force: yes
  with_subelements:
      - "{{ dot_paths }}"
      - items
  # when: "item.0.state in ['template']"
