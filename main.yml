---
# - name: Gathering facts
#   hosts: local
#   gather_facts: yes

- name: Group by distribution
  hosts: local
  tasks:
    - name: "os : {{ ansible_distribution }}"
      group_by: key=os_{{ ansible_distribution|lower }}
      tags:
        - always

- name: Debian packages
  hosts: os_debian
  tags: ['deb']
  roles:
    - {role: apt, tags: ['pkg','apt'], become: yes}

- name: MacOSX packages
  hosts: os_macosx
  tags: ['osx']
  roles:
    - {role: homebrew, tags: ['pkg','brew']}
    - {role: hammerspoon, tags: ['ws','hs']}
    # - {role: osx, tags:['defaults']}

- name: Setup local environment
  hosts: local
  # pre_tasks:
  #   - name: Update repository
  #     git:
  #       repo: git://github.com/LEI/dotfiles.git
  #       dest: "{{ dot_root }}"
  #       version: ansible
  #       update: no
  #     ignore_errors: yes
  tags: ['common', 'home']
  roles:
    - {role: git, tags: ['git']}
    - {role: npm, tags: ['node','npm']}
    - {role: tmux, tags: ['tmux']}
    - {role: vim, tags: ['vim']}
    - {role: bash, tags: ['bash']}
    - {role: bin, tags: ['bin']}
    - {role: files, tags: ['cfg']}

