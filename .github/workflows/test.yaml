---
# https://github.com/bats-core/bats-action
name: test

on: # yamllint disable-line rule:truthy
  push:

jobs:
  my_test:
    runs-on: ubuntu-latest
    name: Install Bats and bats libs
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bats and bats libs
        id: setup-bats
        uses: bats-core/bats-action@3.0.1
        with:
          support-path: "${{ github.workspace }}/test/bats-support"
          assert-path: "${{ github.workspace }}/test/bats-assert"
          file-path: "${{ github.workspace }}/test/bats-file"

      - name: Install bats-mock
        run: git clone --branch=v1 --single-branch https://github.com/jasonkarns/bats-mock "${{ github.workspace }}/test/bats-mock"

      - name: Run tests
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: ./script/test

