- include: check_directory.yml

- name: Gather files stat
  stat:
    path: "{{ dot_home }}/{{ paths.dst + '/' if paths.dst else '' }}{{ item }}"
    follow: false
  register: stat
  with_items: "{{ files }}"
  failed_when: false

- include: backups.yml
  when: enable_backup

- include: templates.yml

