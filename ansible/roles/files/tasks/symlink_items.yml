# Source relative to dot_root, destination relative to dot_home
- name: Symlink items
  file:
    src: "{{ dot_root }}/{{ paths.src + '/' if paths.src else '' }}{{ item.src|default(item) }}"
    dest: "{{ dot_home }}/{{ paths.dst + '/' if paths.dst else '' }}{{ paths.prefix|default('') }}{{ item.dst|default(item)|basename }}"
    state: link
  with_items: "{{ files }}"
  # fail_when;: false

