---
# - name: Gathering facts
#   hosts: local
#   gather_facts: yes

- name: Bootstrap dotfiles and install packages
  hosts: local
  tasks:
    - name: "Distribution: {{ ansible_distribution }}"
      group_by: key=os_{{ ansible_distribution }}
      tags:
        - always

- name: Debian
  hosts: os_Debian
  roles:
    - {role: apt, tags: ['pkg'], become: yes}
    # - {role: debops.nodejs, tags: ['node']}

- name: Mac OS X
  hosts: os_MacOSX
  roles:
    - {role: homebrew, tags: ['pkg']}
    - {role: hammerspoon, tags: ['wm']}

- name: Setup local development environment
  hosts: local
  # pre_tasks:
  #   - name: Update repository
  #     git:
  #       repo: git://github.com/LEI/dotfiles.git
  #       dest: "{{ dot_root }}"
  #       version: ansible
  #       update: no
  #     ignore_errors: yes
  roles:
    - {role: git, tags: ['git']}
    - {role: npm, tags: ['node']}
    - {role: tmux, tags: ['tmux']}
    - {role: vim, tags: ['vim']}
  # handlers:
  #   - include: handlers/handlers.yml

