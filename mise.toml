redactions = [
  # "API_KEY",
  "*_TOKEN",
  # "PASSWORD",
]

[task_config]
includes = ["script"]

[tasks.act]
description = "Run CI workflow locally with act"
run = "act --artifact-server-path=/tmp/.artifacts --matrix=os:ubuntu-latest --rm --workflows=.github/workflows/ci.yaml"

[tasks.ci]
description = "Run CI steps locally"
depends = [
  # "bootstrap",
  "check",
  "coverage",
  "startup",
]

[tasks.hyperfine]
description = "Benchmark shell startup with hyperfine"
run = "hyperfine 'mise run startup' --max-runs=5 --show-output"

[tasks."test:unit"]
alias = "tu"
description = "Run unit tests only"
run = "mise run test -- --filter-tags type:unit"

[tasks."test:smoke"]
alias = "ts"
description = "Run smoke tests (needs deployed home)"
run = "mise run test -- --filter-tags type:smoke"

[tasks.pipeline]
alias = "pl"
description = "Run check, prek and test locally"
depends = [
  "check",
  # "lint",
  "prek",
  "test",
  # "update",
]

[tasks.prek]
alias = "pre-commit"
description = "Run pre-commit hooks on all files"
run = "prek run --all-files"
