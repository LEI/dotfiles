redactions = [
  # "API_KEY",
  "*_TOKEN",
  # "PASSWORD",
]

[task_config]
includes = ["script"]

[tasks.act]
description = "Run CI workflow locally with act"
run = "act --artifact-server-path=/tmp/.artifacts --matrix=os:ubuntu-latest --rm --workflows=.github/workflows/ci.yaml"

[tasks.ci]
description = "Run CI steps locally"
depends = [
  # "bootstrap",
  "check",
  "coverage",
  "startup bash",
  "startup zsh",
]

[tasks.hyperfine]
description = "Benchmark shell startup with hyperfine"
run = "hyperfine 'mise run startup' --max-runs=5 --show-output"

[tasks.pipeline]
alias = "pl"
description = "Run checks and tests locally"
depends = [
  "check",
  # "lint",
  "profile bash",
  "profile zsh",
  "test",
  # "update",
]
run = [
  # Update after check
  "mise update", # ./home/dot_config/mise/config.toml.tmpl
  # Avoid chezmoi timeout obtaining persistent state lock when running tests
  "mise prek", # ./script/prek
]

[tasks.renovate]
description = "Dry-run Renovate locally"
run = "bunx renovate --platform=local --dry-run=${RENOVATE_DRY_RUN:-full}"
[tasks.renovate.env]
GITHUB_COM_TOKEN = "$(gh auth token)" # --user "$(git config github.user)"

[tasks."renovate:config"]
description = "Print resolved Renovate config (managers, fileMatch patterns)"
run = "bunx renovate --platform=local --print-config | jq -Rn '[inputs | try fromjson | select(.err == null)] | last'"
[tasks."renovate:config".env]
GITHUB_COM_TOKEN = "$(gh auth token)"
LOG_FORMAT = "json"
LOG_LEVEL = "debug"

[tasks."renovate:extract"]
description = "Detect dependencies without API calls"
run = "mise run renovate 2>&1 | jq -Rrc 'try fromjson | select(.packageFiles)'"
[tasks."renovate:extract".env]
LOG_FORMAT = "json"
LOG_LEVEL = "info"
RENOVATE_DRY_RUN = "extract"

[tasks."renovate:missed"]
description = "Show per-file manager matching at debug level"
run = "mise run renovate 2>&1 | jq -Rrc 'try fromjson | select(.packageFile) | {msg, manager, packageFile}'"
[tasks."renovate:missed".env]
LOG_FORMAT = "json"
LOG_LEVEL = "debug"
RENOVATE_DRY_RUN = "extract"

[tasks.prek]
alias = "pre-commit"
description = "Run pre-commit hooks on all files"
run = "prek run --all-files"

[tasks."test:unit"]
alias = "tu"
description = "Run unit tests only"
run = "mise run test -- --filter-tags type:unit"

[tasks."test:smoke"]
alias = "ts"
description = "Run smoke tests (needs deployed home)"
run = "mise run test -- --filter-tags type:smoke"
