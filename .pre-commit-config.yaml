---
repos:
  # https://github.com/gitleaks/gitleaks#pre-commit
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
        name: gitleaks # Detect hardcoded secrets
        language: system
        stages:
          - pre-commit

  # https://pre-commit.com/hooks.html
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.ya?ml$ # yamllint trailing-spaces reports line and doesn't auto-fix
      - id: end-of-file-fixer
        exclude: logseq/settings/.*\.json$
      - id: check-yaml
        exclude: ^home/dot_config/goss/goss\.yaml$
      - id: check-added-large-files

  # https://github.com/koalaman/shellcheck-precommit
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        name: shellcheck
        args:
          - --exclude=SC2148
          - --severity=warning
        entry: shellcheck
        exclude: ^(home/.*/(modify_.*\.sh|.*\.tmpl)|(.*/)?(\.config/)?zsh/init\.sh)$
        language: system
        stages:
          - pre-commit

  # https://yamllint.readthedocs.io/en/stable/integration.html#integration-with-pre-commit
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        args:
          - --strict
          - --config-file=home/dot_config/yamllint/config
        # Use yamlfmt installed on the system instead of building with Go
        language: system
        stages:
          - pre-commit

  # https://docs.zizmor.sh/integrations/#pre-commit
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.15.2
    hooks:
      - id: zizmor
        files: ^.github/workflows/.*\.ya?ml$

  - repo: local
    hooks:
      # - id: chezmoi-config
      #   name: chezmoi config
      #   entry: chezmoi cat-config --dry-run --no-tty --refresh-externals=never
      #   files: ^(home/.*|\.chezmoi.*)$
      #   language: system
      #   pass_filenames: false

      # - id: chezmoi-init
      #   name: chezmoi init
      #   entry: chezmoi init --dry-run --no-tty --refresh-externals=never
      #   files: ^(\.chezmoi.*|home/\.chezmoi\.ya?ml\.tmpl)$
      #   language: system
      #   pass_filenames: false

      # - id: chezmoi-status
      #   name: chezmoi status
      #   entry: >-
      #     bash -c 'for f in "$@"; do chezmoi status
      #       --dry-run --no-tty --refresh-externals=never
      #       "$(chezmoi target-path "$f")"; done'
      #   files: ^home/.*$
      #   exclude: "$(chezmoi unmanaged)"
      #   language: system

      - id: validate-schema
        name: validate schemas
        entry: ./script/validate-schema
        language: system
        files: \.(json[c5]?|toml|ya?ml)$
        exclude: ^home/\.chezmoitemplates/|^home/.*/modify_|winget/winget\.json$

      - id: validate-blank
        name: validate blank lines
        entry: ./script/validate-blank
        language: system

      - id: lint-templates
        name: lint templates
        entry: ./script/lint
        args: ["--quiet"]
        language: system
        files: ^home/(.*\.tmpl$|.*/modify_)
        exclude: ^output/|\.chezmoi\.yaml\.tmpl$

      - id: validate-skill
        name: validate skills
        entry: ./script/validate-skill
        language: system
        files: SKILL\.md$
