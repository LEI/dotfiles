---
- name: "Set {{ dot_files_dir | default('directory') }} facts"
  vars:
    _dot_root: "{{ dot_root if dot_files_dir != 'templates' else dot_local_dir }}"
  set_fact:
    dot_targets: []
    dot_role_dir: "{{ item.key }}"
    dot_paths: >
      {{{
        item.key: {
          'src': _dot_root + ('/' + item.value.src if item.value.src | default(false) else '/' + dot_roles_dir + '/' + item.key + '/' + dot_files_dir if dot_files_dir and dot_roles_dir else item.key),
          'dest': dot_home + ('/' + item.value.dest if item.value.dest | default(false) else ''),
          'pattern': item.value.pattern | default(dot_find_pattern),
          'prefix': item.value.prefix | default(''),
          'regex_replace': '' if dot_files_dir != 'templates' else '.j2',
        }
      }}}
  with_dict: "{{ dot_files }}"

# dot_files_type | join(' and ')
- name: "Find {{ dot_role_dir }} {{ dot_files_dir }}"
  find:
    path: "{{ dot_paths[item[0]].src }}"
    pattern: "{{ dot_paths[item[0]].pattern }}"
    file_type: "{{ item[1] }}"
    hidden: yes
    recurse: no
  with_nested:
    - "{{ dot_paths }}"
    - "{{ dot_files_type }}"
  register: dot_find

- name: "Check {{ dot_role_dir }} {{ dot_files_dir }} destination"
  stat:
    path: "{{ dot_paths[item[0].item[0]].dest + '/' + dot_paths[item[0].item[0]].prefix + item[1].path | basename | regex_replace(dot_paths[item[0].item[0]].regex_replace, '') }}"
  with_subelements:
    - "{{ dot_find.results }}"
    - files
  register: dot_stats
  no_log: "{{ dot_no_log }}"

- name: "Register {{ dot_role_dir }} {{ dot_files_dir }} target"
  set_fact:
    dot_targets: >
      {{ dot_targets + [
        {
          'src': item.item.1.path,
          'dest': dot_paths[item.item.0.item.0].dest + '/' + dot_paths[item.item.0.item.0].prefix + item.item.1.path | basename | regex_replace(dot_paths[item.item.0.item.0].regex_replace, ''),
          'exists': item.stat.exists,
          'link': item.stat.lnk_source | default(false),
          'type': item.item.0.item.1,
          'role_name': item.item.0.item.0,
          'role_directory': dot_files_dir,
        }
      ] }}
  # set_fact:
  #   dot_targets: >
  #     {{ dot_targets + [
  #       {
  #         'dot_file': item[0].item[0],
  #         'dot_file_type': item[0].item[1],
  #         'dot_src': item[1].path,
  #         'dot_dest': dot_paths[item[0].item[0]].dest + '/' + dot_paths[item[0].item[0]].prefix + item[1].path | basename | regex_replace(dot_paths[item[0].item[0]].regex_replace, ''),
  #       }
  #     ] }}
  with_items: "{{ dot_stats.results }}"
  no_log: "{{ dot_no_log }}"

# - debug: var=dot_targets
