# Use shell/find + register?
# http://docs.ansible.com/ansible/playbooks_loops.html#id24
- name: "Construct {{ dot_files_dir | default('directory') }} dict"
  vars:
    _dot_root: "{{ dot_root if dot_files_dir != 'templates' else dot_local_dir }}"
  set_fact:
    dot_files_target: >
      {{{
        item.key: {
          'src': _dot_root + ('/' + item.value.src if item.value.src | default(false) else '/' + dot_roles_dir + '/' + item.key + '/' + dot_files_dir if dot_files_dir and dot_roles_dir else item.key),
          'dest': dot_home + ('/' + item.value.dest if item.value.dest | default(false) else ''),
          'pattern': '/' + item.value.pattern | default(dot_find_pattern),
          'prefix': item.value.prefix | default('')
        }
      }}}
  with_dict: "{{ dot_files }}"

# - debug:
#     # var: dot_files_target
#     msg: "{{ item.value }}"
#   with_dict: "{{ dot_files }}"
#   when: dot_log_enable

# - name: Check source path
#   assert:
#     that:
#       - "source != inventory_dir"

- name: Ensure destination directory exists
  file:
    path: "{{ item.value.dest }}"
    state: directory
    follow: true
  with_dict: "{{ dot_files_target }}"


