---
- name: "Generate {{ dot_role_dir }} templates ({{ dot_targets | length }})"
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    backup: "{{ 'yes' if dot_backup_enable and dot_backup_templates else 'no' }}"
    # force: yes
  with_items: "{{ dot_targets }}"
  register: dot_items

