# .tmux.conf
# vim: foldenable foldmethod=marker

# ? https://github.com/edkolev/tmuxline.vim

# github.com/tmux/tmux/blob/master/example_tmux.conf
# github.com/demure/dotfiles/blob/master/tmux.conf
# github.com/tangledhelix/dotfiles/blob/master/tmux.conf

# General {{{
# Turn on xterm key bindings so that additional function keys get escape sequences
set -g xterm-keys on

# Turn the mouse on, but without copy mode dragging
set -g mouse on

# Set colors
set -g default-terminal "screen-256color" #xterm|screen

# Scrollback size
set -g history-limit 10000

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Do not wait for escape characters
set -sg escape-time 0

# Lock after 15 minutes
set -g lock-after-time 1800

# Keep windows around after they exit
#set -g remain-on-exit on

# No bells at all
set -g bell-action none

# Enable activity alerts
setw -g monitor-activity on

# Disable window activity message
set -g visual-activity off

# Automatically rename windows
#setw -g automatic-rename
set-option -g allow-rename off

# Automatically renumber windows
set -g renumber-windows on

# Change the prefix key to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloading ~/.tmux.conf..."

# }}}
# Interface {{{

# Set the title bar
set -g set-titles on
#set -g set-titles-string '#S — #W — #T'

# Set status bar
set -g status-utf8 on
#set -g status-bg default
#set -g status-fg white
set -g status-interval 2
set -g status-left-length 60 #90
set -g status-right-length 60
set -g status-justify centre
#set -g status-left "#[fg=cyan]#H #[fg=yellow]#(curl ipecho.net/plain;echo) #[fg=green]#(uname -r | cut -c 1-6) #(echo $MACHTYPE) #[default]"
#set -g status-right '#[fg=cyan]#S #I:#P #[fg=default]%d %h %Y %H:%M' # %a %d %b %R

#setw -g window-status-format " #F#I:#W#F "
#setw -g window-status-current-format " #F#I:#W#F "

setw -g status-fg white
setw -g status-bg black

# #(whoami)@#H
setw -g status-left " #[bold]#H #[default,fg=white,bg=colour11] #(curl ipecho.net/plain;echo) #[fg=brightblack,bg=black] #(tmux-ifstat)" #[fg=blue]#S #I:#P#[default]"
setw -g status-left-fg black
setw -g status-left-bg blue

setw -g status-right "#[fg=brightblack]#(tmux-mem-cpu-load 1) #[fg=white,bg=colour11] #S #I: #P #[fg=black,bg=blue] %a %d %b %H:%M "
setw -g status-right-fg white
setw -g status-right-bg black

setw -g window-status-format " #I #W "
setw -g window-status-fg white

setw -g window-status-current-format " #I #W "
setw -g window-status-current-fg blue
setw -g window-status-current-bg black
setw -g window-status-current-attr default

# }}}
# Key maps {{{

# unbind -n MouseDrag1Pane
# unbind -temacs-copy MouseDrag1Pane
# Vi copypaste mode
# bind-key -t vi-copy 'v' begin-selection
# bind-key -t vi-copy 'y' copy-selection

#bind m set -g mouse on \; display-message "Mouse ON"
#bind M set -g mouse off \; display-message "Mouse OFF"

# Use vim bindings
setw -g mode-keys vi

# Remap window navigation to vim
unbind-key j
bind-key j select-pane -D
unbind-key k
bind-key k select-pane -U
unbind-key h
bind-key h select-pane -L
unbind-key l
bind-key l select-pane -R

# Some extra key bindings to select higher numbered windows
bind F1 selectw -t:10
bind F2 selectw -t:11
bind F3 selectw -t:12
bind F4 selectw -t:13
bind F5 selectw -t:14
bind F6 selectw -t:15
bind F7 selectw -t:16
bind F8 selectw -t:17
bind F9 selectw -t:18
bind F10 selectw -t:19
bind F11 selectw -t:20
bind F12 selectw -t:21

# Keys to hide and show a window name from the status line
# bind '-' set window-status-format '#I'\; set window-status-current-format '#I'
# bind '+' set window-status-format '#I:#W#F'\; set window-status-current-format '#I:#W#F'

