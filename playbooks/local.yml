---
- name: Local environment
  hosts: local
  gather_facts: no
  tags: [local]

  roles:

    # - role: ssh
    #   tags: [ssh]

    # Bash
    - role: shell
      tags: [bash, bin, shell]

    # Tmux
    - role: tmux
      tags: [tmux]

    # Vim
    - role: vim
      tags: [vim]

    # IRC
    - role: irc
      tags: [irc]

    - role: htop
      tags: [htop]
      when: os not in ['Windows']
