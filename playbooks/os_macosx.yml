---
- name: MacOSX roles
  hosts: os_macosx
  gather_facts: no
  tags: [osx]

  roles:

    # FIXME terminfo (^H sends <BS>)
    # https://github.com/neovim/neovim/wiki/FAQ#my-ctrl-h-mapping-doesnt-work
    # https://github.com/neovim/neovim/issues/2048#issuecomment-78045837
    # infocmp $TERM | sed 's/kbs=^[hH]/kbs=\\177/' > $TERM.ti
    # tic $TERM.ti

    # Homebrew update, upgrade, tap...
    - role: homebrew
      tags: [brew, cask]

    # Homebrew packages
    - role: package
      tags: [pkg]
      packages: "{{ homebrew_packages }}"

    # Homebrew Cask applications
    - role: homebrew-cask
      tags: [cask]
      homebrew_cask_apps: "{{ cask_apps }}"
      homebrew_cask_options: "{{ cask_options }}"

    # Hammerspoon
    - role: hammerspoon
      tags: [ws, hs]

    # OSX defaults
    - role: osx-defaults
      tags: [defaults]

    # rxvt-unicode
    - role: rxvt
      tags: [rxvt]

    # - role: weechat
    #   tags: [irc]
