---
- name: MacOSX roles
  hosts: os_macosx
  gather_facts: no
  tags: [osx]

  # vars_prompt:
  #   - name: "osx_defaults"
  #     prompt: "MacOSX defaults"
  #     default: "test"

  roles:

    - role: homebrew
      tags: [brew]

    - role: package
      tags: [pkg]
      packages: "{{ brew_packages }}"

    - role: package
      tags: [node, npm]
      packages:
        - node

    - role: cask
      tags: [cask]
      packages: "{{ brew_casks }}"

    - role: npm
      tags: [npm]
      # npm_packages: []

    - role: hammerspoon
      tags: [ws, hs]

    # - role: osx
    #   tags:[defaults]
