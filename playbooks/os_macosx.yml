---
- name: MacOSX roles
  hosts: os_macosx
  gather_facts: no
  tags: [osx]

  # vars_prompt:
  #   - name: "osx_defaults"
  #     prompt: "MacOSX defaults"
  #     default: "test"

  roles:

    - role: homebrew
      tags: [brew]

    - role: package
      tags: [pkg]
      packages: "{{ brew_packages }}"

    - role: cask
      tags: [cask]
      packages: "{{ brew_casks }}"

    # Install node and global npm packages
    - role: node
      tags: [node, npm]
      packages: "{{ npm_packages }}"

    - role: hammerspoon
      tags: [ws, hs]
      files:
        dest: .hammerspoon

    # - role: osx
    #   tags:[defaults]
