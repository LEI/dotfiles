---
- name: MacOSX roles
  hosts: os_macosx
  gather_facts: no
  tags: [osx]

  roles:

    # Homebrew update, upgrade, tap
    - role: homebrew
      tags: [brew, cask]

    # Homebrew packages
    - role: package
      tags: [pkg]
      packages: "{{ homebrew_packages }}"

    # Homebrew cask apps
    - role: cask
      tags: [cask]

    # NodeJS
    - role: package
      tags: [node, npm, js]
      packages:
        - node

    # Window manager
    - role: hammerspoon
      tags: [ws, hs]
      files:
        dest: .hammerspoon

    # - role: osx
    #   tags: [defaults]
