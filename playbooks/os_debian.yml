---
- name: Debian roles
  hosts: os_debian
  gather_facts: no
  tags: [deb]

  roles:

    # Update and upgrade apt
    - role: apt
      tags: [apt]

    # Install apt packages
    - role: package
      tags: [pkg]
      packages: "{{ apt_packages }}"

    - role: irc
      tags: [irc]

    - role: i3
      tags: [i3, wm]
      gtk_theme: arc
      when: arch not in ['armv6l']

    - role: rxvt
      tags: [rxvt]
      when: not ansible_architecture | match('armv.*')
