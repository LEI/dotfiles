---
- name: Debian roles
  hosts: os_debian
  gather_facts: no
  tags: [deb]

  roles:

    # Update and upgrade apt
    - role: apt
      tags: [apt]

    # Install apt packages
    - role: package
      tags: [pkg]
      packages: "{{ apt_packages }}"

    # Install NodeJS for Debian/RedHat
    - role: node.js
      tags: [node, npm, js]
