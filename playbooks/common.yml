---
- name: Common roles
  hosts: all
  gather_facts: no
  tags: [common]

  roles:

    - {role: common, tags: [cmn]}
    - {role: bash, tags: [bash]}
    - {role: bin, tags: [bin]}
    - {role: git, tags: [git]}

    - role: vim
      tags: [vim]
      prefix: .
      files_destination: .vim

    - role: tmux
      tags: [tmux]
      templates_destination: .tmux
