---
- name: Local development environment
  hosts: local
  gather_facts: no
  tags: [common]

  roles:

    # Install git
    - role: git
      tags: [git, vcs]
      files:
        prefix: .
      templates:
        prefix: .

    # Install composer and PHP dependencies
    - role: composer
      tags: [composer, php]

    # Install global node modules
    - role: npm
      tags: [npm, js]

    - role: bash
      tags: [bash, files]
      files:
        prefix: .

    - role: bin
      tags: [bin, files]
      files:
        src: bin
        dest: bin

    - role: common
      tags: [cmn, files]
      files:
        prefix: .
      templates:
        prefix: .

    - role: tmux
      tags: [tmux]
      templates:
        dest: .tmux

    - role: vim
      tags: [vim]
      files:
        dest: .vim

    - role: irssi
      tags: [irssi, irc]
      files:
        dest: .irssi
      templates:
        dest: .irssi
