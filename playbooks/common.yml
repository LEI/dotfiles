---
- name: Common environment
  hosts: all
  gather_facts: no
  tags: [common]

  roles:

    - role: ack
      tags: [ack]

    # Install composer and PHP dependencies
    - role: composer.php
      tags: [composer, php]

    # Install global node modules
    - role: npm
      tags: [npm, js]

    # Install git
    - role: git
      tags: [git, vcs]
      # files:
      #   prefix: .
      # templates:
      #   prefix: .

    - role: home
      tags: [home]

    - role: bash
      tags: [bash]

    - role: bin
      tags: [bin]

    - role: tmux
      tags: [tmux]

    - role: vim
      tags: [vim]
