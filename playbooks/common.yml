---
- name: Local development environment
  hosts: local
  gather_facts: no
  tags: [common]

  roles:

    # Install composer and PHP dependencies
    - role: composer
      tags: [composer, php]

    # Install global node modules
    - role: npm
      tags: [npm, js]

    # Install git
    - role: git
      tags: [git, vcs]
      # files:
      #   prefix: .
      # templates:
      #   prefix: .

    - role: home
      tags: [home]

    - role: bash
      tags: [bash]

    - role: bin
      tags: [bin]

    - role: tmux
      tags: [tmux]

    - role: vim
      tags: [vim]

    - role: irssi
      tags: [irssi, irc]

    - role: dot.files
      tags: [dot, files]
      dot_files: "{{ common_dot_files }}"
      # dot_files: "{{ hostvars[inventory_hostname][(ansible_distribution | lower) + '_dot_files'] }}"
