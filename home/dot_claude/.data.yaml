tiers:
  pro:
    model: # sonnet
    subagent: # claude-haiku-4-5
    effort:
  max: # 5x, 20x
    model: opusplan # opus
    subagent: # claude-haiku-4-5
    effort: # medium
  team-standard:
    model: # sonnet
    subagent: # claude-haiku-4-5
    effort:
  team-premium:
    model: # opus
    subagent: # claude-haiku-4-5
    effort: # medium

# Non-standard marketplaces (claude-plugins-official is built-in)
# repo: git-hosted (passed as-is to `claude plugin marketplace add`)
# path: local path relative to homeDir
marketplaces:
  chezmoi:
    path: ".claude/plugins/chezmoi"
  claude-dashboard:
    repo: uppinote20/claude-dashboard
  everything-claude-code:
    repo: affaan-m/everything-claude-code

# Managed plugins: all handled identically by run_onchange_after_plugins.sh
# claude-plugins-official: no version pin (latest is fine)
# other: optional version pin via {name, version} dict item
#
# Installed but not globally enabled (per-project use):
# agent-sdk-dev@claude-plugins-official: per-project
# github@claude-plugins-official: per-project
# gitlab@claude-plugins-official: per-project
# php-lsp@claude-plugins-official: per-project
# plugin-dev@claude-plugins-official: per-project, skills disabled below
# typescript-lsp@claude-plugins-official: per-project
#
# Not installed (use CLI to re-add if needed):
# greptile@claude-plugins-official: needs API key
# semgrep@claude-plugins-official: needs semgrep installed
plugins:
  chezmoi:
    - local
  claude-dashboard:
    - claude-dashboard
  claude-plugins-official:
    - claude-code-setup
    - claude-md-management
    - code-review
    - code-simplifier
    - commit-commands
    - feature-dev
    - frontend-design
    - hookify
    - security-guidance
  everything-claude-code:
    - name: everything-claude-code
      version: "1.9.0"

# Skills disabled globally (plugin installed for per-project use)
