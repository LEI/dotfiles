# Managed marketplaces, all registered by run_onchange_after_plugins.sh
# repo: git-hosted, passed as-is to `claude plugin marketplace add`
# path: local path relative to homeDir
marketplaces:
  chezmoi:
    path: ".claude/plugins/chezmoi"
  claude-dashboard:
    repo: uppinote20/claude-dashboard
  claude-plugins-official:
    repo: anthropics/claude-plugins-official
  # everything-claude-code:
  #   repo: affaan-m/everything-claude-code

# Managed plugins: all handled identically by run_onchange_after_plugins.sh
# claude-plugins-official: no version pin, latest is fine
# other: optional version pin via {name, version} dict item
#
# Not installed (use CLI to re-add if needed):
# greptile@claude-plugins-official: needs API key
# semgrep@claude-plugins-official: needs semgrep installed
#
# Per-project: installed manually, not managed, not uninstalled
keepPlugins:
  - agent-sdk-dev@claude-plugins-official
  - github@claude-plugins-official
  - gitlab@claude-plugins-official
  - lua-lsp@claude-plugins-official
  - php-lsp@claude-plugins-official
  - plugin-dev@claude-plugins-official
  - typescript-lsp@claude-plugins-official
plugins:
  chezmoi:
    - local
  claude-dashboard:
    - claude-dashboard
  claude-plugins-official:
    # - claude-code-setup
    - claude-md-management
    - code-review
    - code-simplifier
    - commit-commands
    - feature-dev
    - frontend-design
    # - hookify
    # - security-guidance
  # everything-claude-code:
  #   - name: everything-claude-code
  #     version: "1.9.0"
