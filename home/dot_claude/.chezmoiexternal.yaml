# TypeScript: coding-style, hooks, patterns, security, testing
rules/ecc/typescript:
  type: archive
  url: https://github.com/affaan-m/everything-claude-code/archive/main.tar.gz
  stripComponents: 3
  include: ["*/rules/typescript/*"]
  refreshPeriod: 168h

# Language packs: all have paths: frontmatter scoped to file extensions (zero context cost)
rules/ecc/golang:
  type: archive
  url: https://github.com/affaan-m/everything-claude-code/archive/main.tar.gz
  stripComponents: 3
  include: ["*/rules/golang/*"]
  refreshPeriod: 168h

rules/ecc/python:
  type: archive
  url: https://github.com/affaan-m/everything-claude-code/archive/main.tar.gz
  stripComponents: 3
  include: ["*/rules/python/*"]
  refreshPeriod: 168h

rules/ecc/swift:
  type: archive
  url: https://github.com/affaan-m/everything-claude-code/archive/main.tar.gz
  stripComponents: 3
  include: ["*/rules/swift/*"]
  refreshPeriod: 168h
