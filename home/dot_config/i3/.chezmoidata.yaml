---
i3:
  themeName: Arc-Dark
  # iconThemeName: Arc-Dark
  iconThemeName: Papirus-Dark
  darkMode: true
  pmTray: true
  borderRadius: 18
  borderWidth: 1
  fontFamily: Noto Sans
  fontSize: 10
  opacity: 0.75
  barFont: pango:Noto Sans Mono, FontAwesome 10
  environment:
    GDK_DPI_SCALE: 1
    GDK_SCALE: 2
    # GTK_ICON_THEME:
    # GTK_THEME: Adwaita:dark
    QT_FONT_DPI: 192

    # GTK2_RC_FILES: "$HOME/.gtkrc-2.0"
    # GTK2_RC_FILES: "$HOME/.config/gtk-2.0"

    QT_AUTO_SCREEN_SCALE_FACTOR: 0 # 1
    # QT_QPA_PLATFORMTHEME: gtk2 # (xdg-desktop-portal)
    QT_QPA_PLATFORMTHEME: qt5ct
    # QT_QPA_PLATFORMTHEME: qt6ct

    QT_SCALE_FACTOR: 1
    # STEAM_FORCE_DESKTOPUI_SCALING: 1.5
    # STEAM_FORCE_DESKTOPUI_SCALING: 2.0
extraPackages:
  arc-gtk-theme:
    enabled: "{{ .features.i3 }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  arc-icon-theme:
    enabled: "{{ .features.i3 }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  autotiling-rs:
    enabled: "{{ .features.i3 }}"
  blueman:
    enabled: '{{ and .features.i3 (eq .chassisType "laptop") }}'
  caffeine-ng:
    enabled: "{{ .features.i3 }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  dex:
    enabled: "{{ .features.i3 }}"
  feh: # nitrogen
    enabled: "{{ .features.i3 }}"
  i3lock-color betterlockscreen:
    enabled: "{{ .features.i3 }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  # i3lock:
  #   name: i3lock xss-lock
  #   enabled: "{{ .features.i3 }}"
  # i3-resurrect:
  #   enabled: "{{ .features.i3 }}"
  i3-wm:
    enabled: "{{ .features.i3 }}"
  i3status-rust:
    enabled: "{{ .features.i3 }}"
  # i3status:
  #   enabled: "{{ .features.i3 }}"
  lightdm:
    enabled: "{{ .features.i3 }}"
  # lxappearance:
  #   enabled: "{{ .features.i3 }}"
  network-manager-applet:
    enabled: "{{ .features.i3 }}"
  ttf-noto-nerd: # noto-fonts
    enabled: "{{ .features.i3 }}"
  # pactl:
  picom:
    enabled: "{{ .features.i3 }}"
  pavucontrol:
    name: pavucontrol alsa-utils alsa-plugins
    enabled: "{{ .features.i3 }}"
    description: PulseAudio Volume Control
  # playerctl:
  redshift:
    name: redshift geoclue
    enabled: "{{ .features.i3 }}"
  thunar:
    enabled: "{{ .features.i3 }}"
  qt5-styleplugins qt6gtk2:
    enabled: "{{ .features.i3 }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  # qt5ct:
  #   enabled: "{{ .features.i3 }}"
  xcwd:
    enabled: "{{ .features.i3 }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  xdg-desktop-portal:
    enabled: "{{ .features.i3 }}"
  xfce4-power-manager:
    enabled: "{{ .features.i3 }}"
  xfce4-settings:
    enabled: "{{ .features.i3 }}"
  xfce4-volumed-pulse:
    enabled: "{{ .features.i3 }}"
  xorg-server:
    enabled: "{{ .features.i3 }}"
  # xorg-xbacklight:
  #   enabled: "{{ .features.i3 }}"
  xorg-xev:
    enabled: "{{ .features.i3 }}"
  xorg-xinit:
    enabled: "{{ .features.i3 }}"
  xorg-xrandr:
    enabled: "{{ .features.i3 }}"
  xorg-xrdb:
    enabled: "{{ .features.i3 }}"
  xorg-xwininfo:
    enabled: "{{ .features.i3 }}"
  yin-yang: # darkman
    enabled: "{{ .features.i3 }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
