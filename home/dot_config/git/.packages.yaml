---
enabled: "{{ .features.git }}"
packages:
  act: # "@github/local-action" only supports JavaScript and TypeScript
    enabled: '{{ and (eq .osIDLike "arch" "darwin") (ne .profile "minimal") }}'
    nameOverwrite:
      gh: nektos/gh-act
    type: '{{ ne .osIDLike "arch" | ternary "brew" nil }}'
  # gcli:
  ghq:
    nameOverwrite:
      mise: github:x-motemen/ghq
      windows: x-motemen.ghq
    type: '{{ eq .osIDLike "alpine" "android" "debian" "fedora" "opensuse" "rhel" | ternary "mise" nil }}'
  git:
    nameOverwrite:
      windows: Git.Git
  git-absorb:
    enabled: '{{ and (not .vm) (not (and (eq .osID "android" "ubuntu") (le (float64 .osVersion) 20.04))) }}'
    nameOverwrite:
      mise: github:tummychow/git-absorb
      windows: tummychow.git-absorb
    type: '{{ and (ge (int .osVersion) 44) (eq .osID "fedora") | ternary "mise" nil }}'
  git-bug:
    type: brew
  # git-cal:
  git-extras:
    enabled: '{{ not (eq .osIDLike "alpine" "opensuse" "windows") }}'
    type: '{{ eq .osIDLike "arch" | ternary "aur" (eq .osID "fedora" | ternary "brew" nil) }}'
  git-filter-repo:
    enabled: '{{ not (eq .osIDLike "android" "windows") }}'
    type: '{{ eq .osID "fedora" | ternary "brew" nil }}'
  # git-lfs:
  # git-sizer:
  git-wt:
    name: k1LoW/tap/git-wt
    type: brew
  gitleaks:
    nameOverwrite:
      mise: aqua:gitleaks/gitleaks
    type: '{{ ne .osIDLike "darwin" | ternary "mise" nil }}'
  # gitui:
  #   enabled: '{{ and (ne .osIDLike "debian") }}'
  #   nameOverwrite:
  #     windows: stephandilly.gitui
  lazygit: # tig
    nameOverwrite:
      mise: aqua:jesseduffield/lazygit
      windows: JesseDuffield.lazygit
    type: '{{ not (eq .osIDLike "alpine" "android" "arch" "darwin" "windows") | ternary "mise" nil }}'
  prek: # pre-commit
    # type: '{{ eq .osIDLike "alpine" "android" "arch" "debian" "fedora" "windows" | ternary "mise" nil }}'
    nameOverwrite:
      mise: github:j178/prek # Segmentation faul with aqua:j178/prek on ARM
    type: '{{ eq .osIDLike "darwin" | ternary "brew" "mise" }}'
    # type: brew
  zizmor:
    # zizmor has no musl build, so alpine falls through to apk instead of mise
    # android has no compatible asset, so skip it entirely
    enabled: '{{ ne .osID "android" }}'
    nameOverwrite:
      mise: aqua:zizmorcore/zizmor
    type: '{{ not (eq .osIDLike "darwin" "alpine") | ternary "mise" nil }}'
