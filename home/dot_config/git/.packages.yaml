---
enabled: "{{ .features.git }}"
packages:
  act: # "@github/local-action" only supports JavaScript and TypeScript
    enabled: '{{ and (eq .osIDLike "arch" "darwin") (ne .profile "minimal") }}'
    nameOverwrite:
      gh: nektos/gh-act
    type: '{{ ne .osIDLike "arch" | ternary "brew" nil }}'
  # gcli:
  ghq:
    nameOverwrite:
      windows: x-motemen.ghq
    type: '{{ eq .osIDLike "alpine" "android" "debian" "fedora" "opensuse" | ternary "mise" nil }}'
  git:
    nameOverwrite:
      windows: Git.Git
  git-absorb:
    enabled: '{{ and (not (and (eq .osID "android" "ubuntu") (le (float64 .osVersion) 20.04))) }}'
    nameOverwrite:
      windows: tummychow.git-absorb
  # git-cal:
  git-extras:
    enabled: '{{ not (eq .osIDLike "alpine" "opensuse" "windows") }}'
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  git-filter-repo:
    enabled: '{{ not (eq .osIDLike "android" "windows") }}'
  # git-lfs:
  # git-sizer:
  git-wt:
    name: k1LoW/tap/git-wt
    type: brew
  gitleaks:
    type: '{{ ne .osIDLike "darwin" | ternary "mise" nil }}'
  # gitui:
  #   enabled: '{{ and (ne .osIDLike "debian") }}'
  #   nameOverwrite:
  #     windows: stephandilly.gitui
  lazygit: # tig
    nameOverwrite:
      windows: JesseDuffield.lazygit
    type: '{{ not (eq .osIDLike "alpine" "android" "arch" "darwin" "windows") | ternary "mise" nil }}'
  prek: # pre-commit
    # type: '{{ eq .osIDLike "alpine" "android" "arch" "debian" "fedora" "windows" | ternary "mise" nil }}'
    type: '{{ eq .osIDLike "darwin" | ternary "brew" "mise" }}'
    # type: brew
  # zizmor:
