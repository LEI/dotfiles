---
duti:
  # Apps allowed in LSHandlers ContentType entries
  # Script fails if anything else is found; URL schemes skipped (app-specific)
  allowedHandlers:
    - com.aone.keka
    - com.apple.calendarfilehandler
    - com.apple.ical
    - com.apple.mail
    - com.apple.QuickTimePlayerX
    - com.google.Chrome
    - com.microsoft.Excel
    - com.neovide.neovide
  utis:
    com.google.Chrome:
      - public.html
    com.microsoft.Excel:
      - public.comma-separated-values-text
    com.neovide.neovide:
      - com.microsoft.ini
      - com.microsoft.typescript
      - com.netscape.javascript-source
      - com.sun.java-source
      - net.daringfireball.markdown
      - org.iso.sql
      - org.lua.lua-source
      - org.vim.cfg-file
      - public.bash-script
      - public.css
      - public.data
      - public.json
      - public.patch-file
      - public.perl-script
      - public.php-script
      - public.plain-text
      - public.python-script
      - public.ruby-script
      - public.script
      - public.shell-script
      - public.source-code
      - public.text
      - public.toml
      - public.unix-executable
      - public.xml
      - public.yaml
  # Extensions without a standard UTI
  extensions:
    com.neovide.neovide:
      - cmake
      - dart
      - dockerfile
      - gemspec
      - go
      - jsx
      - kt
      - lock
      - makefile
      - ml
      - rs
      - svelte
      - ts
      - tsx
      - vue
      - zsh
  schemes:
    com.apple.mail:
      - mailto
    com.google.Chrome:
      - http
      - https
