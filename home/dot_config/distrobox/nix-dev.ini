# Inert marker, never fed to `distrobox assemble`. Hashed by the sibling
# run_onchange script to re-trigger the nix export on change; the box is
# created manually, see the dotfiles kb note.
# Plain fedora base, not fedora-toolbox: the toolbox image carries the
# com.github.containers.toolbox label, which lists the box in `toolbox list
# --containers` where toolbox (and topgrade's toolbx step) then reject it as
# too old. A non-toolbox base keeps the distrobox box out of that list.
[nix-dev]
image=registry.fedoraproject.org/fedora:43
volume=~/.local/share/nix:/nix
