---
extraPackages:
  topgrade:
    enabled: '{{ and (get .features "topgrade") (not (eq .osIDLike "debian" "fedora")) }}'
    nameOverwrite:
      arch: topgrade-bin
      manjaro: topgrade
      windows: topgrade-rs.topgrade
    type: '{{ and (eq .osIDLike "arch") (ne .osID "manjaro") | ternary "aur" nil }}'
