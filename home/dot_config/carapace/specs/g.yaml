---
# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: g
description: git
# run: '$[git, status, --branch, --short]'
# run: '$(if [ $# -eq 0 ]; then git status --branch --short; else git "$@"; fi)'
# run: '{{ if eq .Args "" }}git status --branch --short{{ else }}git {{ .Args }}{{ end }}'
run: '$(bash -c "if [ $# -eq 0 ]; then git status --branch --short; else git \"\$@\"; fi" -- "$@")'
parsing: disabled
completion:
  positionalany: ["$carapace.bridge.CarapaceBin([git])"]
