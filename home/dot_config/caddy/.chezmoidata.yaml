---
# Reverse proxy sites grouped by feature
# AI inference backends are in ai.yaml (.ai.providers)
# health: path for liveness checks (goss, monitoring); omit if root returns 200
caddy:
  sites:
    ai:
      claude-task-viewer:
        port: 3456
    oage:
      bifrost:
        port: 8180
      open-notebook:
        port: 8502
      open-notebook-api:
        port: 5055
        health: /health
      open-webui:
        port: 8503
        health: /health
      surrealdb:
        port: 8000
        health: /health
    otel:
      # alertmanager:
      #   port: 9093
      #   health: /-/healthy
      grafana:
        port: 3033
        health: /api/health
        dialTimeout: 1800s
        responseHeaderTimeout: 1800s
      prometheus:
        port: 9090
        health: /-/healthy
      tempo:
        port: 3200
        health: /ready
      webhook:
        port: 9000
        health: /
    php:
      mailpit:
        port: 8025
