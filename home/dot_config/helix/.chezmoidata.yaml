---
extraPackages:
  helix:
    enabled: '{{ and .features.helix (ne .osIDLike "debian") }}'
    nameOverwrite:
      windows: helix.helix
    type: '{{ eq .osIDLike "windows" | ternary "winget" nil }}'
  helixbinhx:
    enabled: '{{ and .features.helix (eq .osID "arch") }}' # ne .osID "manjaro"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
