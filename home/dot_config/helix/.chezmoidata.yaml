---
extraPackages:
  helix:
    enabled: '{{ and (get .features "helix") (ne .osIDLike "debian") }}'
    nameOverwrite:
      alpine: helix tree-sitter-grammars
      android: helix helix-grammars
      windows: helix.helix
  helixbinhx:
    enabled: '{{ and (get .features "helix") (eq .osID "arch") }}' # ne .osID "manjaro"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
