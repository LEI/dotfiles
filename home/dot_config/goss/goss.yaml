# System health
{{- if or (eq .Vars.os "darwin") (and (eq .Vars.os "linux") (ne (env "CONTAINER_PROVIDER") ""))}}
command:
{{- if eq .Vars.os "darwin"}}
  docker-engine:
    exec: docker info --format '{{`{{.ServerVersion}}`}}'
    exit-status: 0
    timeout: 5000
{{- if .Vars.features.processCompose }}
  launchd-process-compose:
    exec: launchctl list com.process-compose | grep -q PID
    exit-status: 0
    timeout: 3000
{{- end }}
{{- if .Vars.features.otel }}
  launchd-webhook:
    exec: launchctl list com.webhook.alert | grep -q PID
    exit-status: 0
    timeout: 3000
{{- end }}
{{- range $name, $p := .Vars.ai.providers }}
{{- if not (hasKey $p "label") }}{{ continue }}{{ end }}
{{- $enabled := true }}{{ if hasKey $p "enabled" }}{{ $enabled = index $p "enabled" }}{{ end }}
  launchd-{{ $name }}:
    exec: launchctl list {{ $p.label }} | grep -q PID
    exit-status: {{ if $enabled }}0{{ else }}{ gt: 0 }{{ end }}
    timeout: 3000
{{- end }}
{{- end}}
{{- if hasKey .Vars "scripts" }}
{{- range .Vars.scripts }}
  check-{{ trimSuffix ".sh" . }}:
    exec: sh check/{{ . }}
    exit-status: 0
    timeout: 120000
{{- end }}
{{- end }}
{{- if and (eq .Vars.os "linux") (ne (env "CONTAINER_PROVIDER") "")}}
  container-engine:
    exec: {{ env "CONTAINER_PROVIDER" }} info --format '{{`{{.ServerVersion}}`}}'
    exit-status: 0
    timeout: 5000
{{- end}}
{{- end}}

{{- if eq .Vars.os "linux"}}
service:
{{- if .Vars.features.processCompose }}
  # process-compose:
  #   enabled: true
  #   running: true
{{- end }}
{{- if .Vars.features.otel }}
  # webhook:
  #   enabled: true
  #   running: true
{{- end }}
{{- if .Vars.features.ai }}
{{- range $name, $p := .Vars.ai.providers }}
{{- if not (hasKey $p "label") }}{{ continue }}{{ end }}
{{- $enabled := true }}{{ if hasKey $p "enabled" }}{{ $enabled = index $p "enabled" }}{{ end }}
  {{ $name }}:
    enabled: {{ $enabled }}
    running: {{ $enabled }}
{{- end }}
{{- end }}
{{- end }}

{{- if .Vars.featureChecks }}
gossfile:
{{- range .Vars.featureChecks }}
  {{ . }}: {}
{{- end }}
{{- end }}

# Health checks from caddy.sites + ai.backends (built in vars.yaml.tmpl)
{{- if .Vars.checks}}
http:
{{- range $name, $check := .Vars.checks}}
  {{ $check.url }}:
    status: 200
    timeout: {{ get $check "timeout" | default 5000 }}
{{- end}}
{{- end}}
