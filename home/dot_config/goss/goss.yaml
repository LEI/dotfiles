# yamllint disable-file
# prettier-ignore
---
# https://github.com/goss-org/goss/blob/master/docs/goss.yaml
{{ $ports := dict
  "docker-plain" 2375
  "docker-tls" 2376
  "telnet" 23
  "vnc" 5900 -}}
addr:
{{- range $name := keys $ports | sortAlpha}}
  127.0.0.1:{{ index $ports $name }}:
    title: {{ $name }}
    reachable: false
    timeout: 500
{{- end}}

