---
apiVersion: 1
groups:
  - orgId: 1
    name: prometheus-bridge
    folder: Alerts
    interval: 30s
    rules:
      - uid: prometheus-alert-bridge
        title: Prometheus alert bridge
        for: 0s
        noDataState: OK
        condition: B
        annotations:
          summary: "{{ $labels.alertname }} ({{ $labels.severity }})"
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: ALERTS{alertstate="firing"}
              refId: A
            relativeTimeRange:
              from: 60
              to: 0
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              reducer: last
              expression: A
              refId: B
