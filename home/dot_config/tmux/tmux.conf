setenv -g TMUX_CONFIG "$HOME/.config/tmux"
setenv -g TPM_DIR "$TMUX_CONFIG/plugins/tpm"

# https://github.com/tmux-plugins/tpm/issues/105
setenv -g TMUX_PLUGIN_MANAGER_PATH "$TMUX_CONFIG/plugins/"

if "test ! -d $TPM_DIR" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TPM_DIR && $TPM_DIR/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "$TPM_DIR/tpm"

# if-shell 'test -f $HOME/.tmux.conf.local' 'source-file $HOME/.tmux.conf.local'
if-shell "test -f $TMUX_CONFIG/tmux.conf.local" "source-file $TMUX_CONFIG/tmux.conf.local"

bind -N 'Reload config' R
# bind -N 'Reload config' r
bind -N 'New window' c

# tmux-logging
bind -N 'Toggle logging' P
bind -N 'Screen capture' M-p
