---
enabled: "{{ .features.node }}"
packages:
  bun:
    # FIXME: bun download fails in termux
    enabled: '{{ not (eq .osIDLike "android") }}'
    type: mise
  node-mise:
    enabled: '{{ not (eq .osIDLike "alpine" "android") }}'
    name: node
    version: lts # {{ `{{ env['NODE_VERSION'] | default(value='lts') }}` }}
    type: mise
  nodejs:
    enabled: '{{ eq .osIDLike "alpine" "android" "windows" }}'
    nameOverwrite:
      alpine: node
      # android: nodejs # -lts
      # arch: nodejs # -lts-jod
      # darwin: node@24
      windows: OpenJS.NodeJS # .LTS
    # FIXME(termux): hangs terminal "No such file or directory (os error 2)"
    # ~/.local/share/mise/installs/node/23.11.0/bin/node -v
    # type: '{{ eq .osIDLike "alpine" | ternary nil "mise" }}'
    # version: '{{ eq .packageType "mise" | ternary "lts" "" }}'
  npm:
    type: '{{ eq .osIDLike "alpine" | ternary nil "npm" }}'
  pnpm:
    # pnpm.pnpm
    type: npm
  yarn:
    type: npm
  runme:
    nameOverwrite:
      mise: npm:runme
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  "@fission-ai/openspec":
    enabled: "{{ .features.ai }}"
    nameOverwrite:
      mise: npm:@fission-ai/openspec
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  # "@qodo/command": # uv tool install pr-agent
  #   enabled: "{{ .features.ai }}"
  #   type: npm
  # cline: # roocode
  #   enabled: "{{ .features.ai }}"
  #   type: npm
  bash-language-server:
    enabled: "{{ not .features.neovim }}"
    nameOverwrite:
      mise: npm:bash-language-server
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  prettier:
    enabled: "{{ not .features.neovim }}"
    nameOverwrite:
      mise: npm:prettier
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  sql-language-server:
    enabled: "{{ and .features.sql (not .features.neovim) }}"
    nameOverwrite:
      mise: npm:sql-language-server
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  typescript:
    enabled: "{{ not .features.neovim }}"
    nameOverwrite:
      mise: npm:typescript
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  typescript-language-server:
    enabled: "{{ not .features.neovim }}"
    nameOverwrite:
      mise: npm:typescript-language-server
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  # https://github.com/hrsh7th/vscode-langservers-extracted/pull/11
  vscode-langservers-extracted@4.8:
    enabled: "{{ not .features.neovim }}"
    nameOverwrite:
      mise: npm:vscode-langservers-extracted@4.8
    type: '{{ .features.mise | ternary "mise" "npm" }}'
  yaml-language-server@next:
    enabled: "{{ not .features.neovim }}"
    nameOverwrite:
      mise: npm:yaml-language-server@next
    type: '{{ .features.mise | ternary "mise" "npm" }}'
