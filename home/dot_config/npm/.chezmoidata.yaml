---
extraPackages:
  nodejs:
    enabled: '{{ (get .features "node") }}'
    nameOverwrite:
      alpine: node
      android: node
      arch: nodejs-lts-jod
      darwin: node # @24
      windows: OpenJS.NodeJS # .LTS
    # FIXME(termux): hangs terminal "No such file or directory (os error 2)"
    # ~/.local/share/mise/installs/node/23.11.0/bin/node -v
    # type: '{{ eq .osIDLike "alpine" | ternary nil "mise" }}'
  node:
    enabled: '{{ and (get .features "node") (ne .osIDLike "alpine") }}'
    type: mise
  npm:
    enabled: '{{ and (get .features "node") (eq .osIDLike "alpine") }}'
  pnpm:
    enabled: '{{ get .features "node" }}'
    type: npm
  yarn:
    enabled: '{{ get .features "node" }}'
    type: npm
  runme:
    # enabled: '{{ get .features "node" }}'
    type: npm
