---
enabled: "{{ .features.neovim }}"
packages:
  # NOTE: latest nvim requires GLIBC_2.42
  neovim:
    # enabled: '{{ or (ne .osIDLike "debian") (eq .libc "gnu") }}'
    nameOverwrite:
      windows: '{{ eq .packageType "winget" | ternary "Neovim.Neovim" nil }}'
    type: |-
      {{ and (eq .osIDLike "debian") (ne .libc "gnu") | ternary "mise"
        (eq .packageType "npm" "gem" | ternary .packageType nil) }}
