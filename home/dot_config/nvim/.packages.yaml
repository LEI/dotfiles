---
enabled: "{{ .features.neovim }}"
packages:
  gs:
    description: Interpreter for PostScript and PDF
    type: brew
  mmdc:
    # enabled: "{{ .features.node }}"
    nameOverwrite:
      npm: "@mermaid-js/mermaid-cli"
    type: npm
  # FIXME: fedora nvim v0.11.6
  # NOTE: latest nvim requires GLIBC_2.42
  neovim:
    # enabled: '{{ or (ne .osIDLike "debian") (eq .libc "gnu") }}'
    nameOverwrite:
      windows: '{{ eq .packageType "winget" | ternary "Neovim.Neovim" nil }}'
    type: '{{ and (eq .osIDLike "debian") (ne .libc "gnu") | ternary "mise"
        (eq .packageType "npm" "gem" | ternary .packageType nil) }}'
    # version: 0.12.1
  # TODO: replace [python3-]neovim in ../mise/system-python-packages.tmpl
  pynvim:
    enabled: '{{ and .features.python (eq .osIDLike "darwin") }}'
    type: uv
  tree-sitter-cli:
    type: brew
