---
enabled: "{{ .features.bash }}"
packages:
  bash:
    enabled: '{{ ne .os "windows" }}'
  bashate:
    enabled: '{{ ne .profile "minimal" }}'
    type: brew
  bash-completion:
    enabled: '{{ ne .os "windows" }}'
  # FIXME: "mise install bats" 404 on android
  bats:
    nameOverwrite:
      brew: bats-core
      # pacman: bats bats-assert bats-support
    type: '{{ .features.brew | ternary "brew" (eq .osIDLike "alpine" "arch" | ternary nil "mise") }}'
  # # NOTE: bats-assert is missing stderr functions on alpine
  # bats-assert bats-support bats-file:
  #   enabled: '{{ or .features.brew (eq .osIDLike "arch") }}' # "alpine"
  #   nameOverwrite:
  #     brew: kaos/shell/bats-assert kaos/shell/bats-support kaos/shell/bats-file
  #   # type: '{{ not (eq .osIDLike "alpine" "arch") | ternary "brew" nil }}'
  #   type: '{{ not (eq .osIDLike "arch") | ternary "brew" nil }}'
  # bats-mock:
  #   enabled: "{{ .features.brew }}"
  #   nameOverwrite:
  #     brew: kaos/shell/bats-mock
  #   type: brew
  kcov:
    # enabled: "{{ or .features.bash .features.brew }}"
    type: '{{ not (eq .osIDLike "arch") | ternary "brew" nil }}'
