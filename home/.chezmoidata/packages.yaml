---
# https://www.chezmoi.io/user-guide/advanced/install-packages-declaratively/
commonPackages:
  - bat
  - curl
  - { name: eza, windows: eza-community.eza, id: not debian }
  - { name: fd, windows: sharkdp.fd, idLike: not debian }
  - git
  - { name: jq, windows: jqlang.jq }
  - { name: ripgrep, windows: BurntSushi.ripgrep.MSVC }
  # - { name: shellcheck, feature: not neovim, windows: koalaman.shellcheck }
  - { name: starship, idLike: not debian }
  - { name: yq, windows: MikeFarah.yq }
  - { name: zoxide, windows: ajeetdsouza.zoxide }
packages:
  alpine:
    - bash
    - build-base # gcc
    - gpg
    - gzip
    - skim
    - tar
    - xdg-utils # xdg-open
    - xz
    - { name: helix, feature: helix }
    - { name: vim, feature: vim }
    - { name: neovim, feature: neovim }

    # NOTE(ble.sh): /lib/bash/{fdflags,sleep}: No such file or directory
    # builtin: fdflags: not a shell builtin
    # enable: cannot open shared object /lib/bash/sleep

    # Build node (mise)
    # - g++
    # - linux-headers
    # - make
    - python3

    # Cargo gitlab-ci-ls
    - openssl-dev
    # https://github.com/sfackler/rust-openssl/issues/2185
    - openssl-libs-static
  android:
    - gnupg
    - nodejs
    - proot
    - skim
    - starship
    - sudo
    - which
    - { name: helix, feature: helix }
    # - { name: helixbinhx, feature: helix, idLike: arch, aur: true }
    - { name: neovim, feature: neovim }
    - { name: vim, feature: vim }
  arch: # Archlinux/Manjaro
    - base-devel
    - gnu-netcat
    - gnupg
    - skim
    - time # condition: command time
    - { name: helix, feature: helix }
    - { name: neovim, feature: neovim }
    - { name: vim, feature: vim }
    # https://github.com/Jguer/yay#other-distributions
    - { name: yay, id: manjaro }
  darwin:
    brews:
      - gpg
      - sk
    casks:
      - firefox
      - google-chrome
  debian: # Debian/Ubuntu
    - apt-utils
    - build-essential
    - gpg
    - time # condition: command time
    - { name: vim, feature: vim }

    # Cargo gitlab-ci-ls
    - pkg-config
    - libssl-dev # openssl-devel on Fedora

    # Debian devcontainer
    - python3
    - python3-venv
  # fedora:
  #   - openssl-devel
  windows:
    - jdx.mise
    # - { name: golang.go, feature: go }
    - { name: helix.helix, feature: helix }
    - { name: neovim.neovim, feature: neovim }
    # - { name: openjs.nodejs, feature: node }
    # - { name: openjs.nodejs.lts, feature: node }
    - { name: vim.vim, feature: vim }
