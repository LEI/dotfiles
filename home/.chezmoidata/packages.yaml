---
# https://www.chezmoi.io/user-guide/advanced/install-packages-declaratively/
commonPackages:
  - name: autossh
    enabled: '{{ and .features.ssh (not (eq .osIDLike "debian" "windows")) }}'
  - name: bandwhich # netshow, slurm
    enabled: '{{ and (not (eq .osIDLike "debian" "fedora" "windows")) (ne .profile "minimal") }}'
  - name: bkt
    enabled: '{{ not (eq .osIDLike "arch" "alpine" "debian" "fedora" "windows") }}'
    # nameOverwrite:
    #   arch: bkt-bin
    # type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - { name: build-base, enabled: '{{ eq .osIDLike "alpine" }}' }
  # - { name: below, enabled: '{{ not (eq .osIDLike "arch" "debian") }}' }
  - name: bottom
    enabled: '{{ not (eq .osIDLike "debian" "fedora") }}'
    nameOverwrite:
      windows: clement.bottom
  - name: ca-certificates
    enabled: '{{ eq .osIDLike "arch" "debian" }}'
  - name: cargo-binstall
    enabled: '{{ and .features.rust (not (eq .osIDLike "alpine" "debian" "fedora")) }}'
  - name: chromium
    enabled: '{{ and (eq .osIDLike "arch" "darwin" "fedora") (not (or .ephemeral .headless)) }}'
    nameOverwrite:
      darwin: ungoogled-chromium
      debian: chromium-browser
      # windows: Hibbiki.Chromium
    type: '{{ eq .osIDLike "darwin" | ternary "cask" nil }}'
  - name: codex
    enabled: '{{ and .features.ai (eq .osIDLike "arch" "darwin") }}'
    nameOverwrite:
      arch: openai-codex-bin
      # npm: @openai/codex
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - { name: coreutils, enabled: '{{ eq .os "linux" }}' }
  # - name: cotp
  #   enabled: '{{ ne .profile "minimal" }}'
  - name: crush
    enabled: '{{ and .features.ai (eq .osIDLike "arch" "darwin" "windows") }}'
    nameOverwrite:
      arch: crush-bin
      darwin: charmbracelet/tap/crush
      # npm: @charmland/crush
      windows: charmbracelet.crush
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: dcv # dtop
    enabled: '{{ and .features.docker (eq .osIDLike "darwin") }}'
    nameOverwrite:
      darwin: tokuhirom/tap/dcv
  - name: devpod
    enabled: '{{ and (eq .osIDLike "arch" "darwin") (not (or .ephemeral .headless)) }}'
    nameOverwrite:
      arch: devpod-bin
    # type: '{{ eq .osIDLike "arch" | ternary "aur" (eq .osIDLike "darwin" | ternary "cask" nil) }}'
    type: '{{ get (dict "arch" "aur" "darwin" "cask") .osIDLike | default nil }}'
  - name: difftastic
    enabled: '{{ ne .osIDLike "debian" }}'
    nameOverwrite:
      windows: wilfred.difftastic
  - name: direnv
    nameOverwrite:
      windows: direnv.direnv
  - name: dive # sou
    enabled: '{{ and .features.docker (not (eq .osID "alpine" "fedora")) }}'
    nameOverwrite:
      windows: wagoodman.dive # scoop: main/dive
  # - dog, doggo, mtr, trippy, oryx / tshark termshark
  # - dua, dug
  # - duf, dysk
  - name: dust # deletor, diskonaut, gdu, kondo, pdu, wiper
    enabled: '{{ not (eq .osIDLike "debian") }}'
    nameOverwrite:
      windows: bootandy.dust
  # - name: fancy-cat
  #   enabled: '{{ eq .osIDLike "arch" "darwin" }}'
  #   type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: fd
    enabled: '{{ ne .osIDLike "debian" }}'
    nameOverwrite:
      windows: sharkdp.fd
  # https://support.mozilla.org/en-US/kb/install-firefox-linux
  - name: firefox
    enabled: '{{ and (eq .osIDLike "arch" "darwin" "fedora" "windows") (not (or .ephemeral .headless)) }}'
    nameOverwrite:
      # darwin: firefox{,beta,developer-edition,esr,nightly}
      windows: Mozilla.Firefox # .DeveloperEdition
    type: '{{ eq .osIDLike "darwin" | ternary "cask" nil }}'
  - name: envx
    enabled: '{{ eq .osIDLike "arch" }}'
    nameOverwrite:
      arch: envx-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  # - name: foot
  #   enabled: '{{ and .features.sway (not (eq .osIDLike "darwin" "debian" "windows")) (not .headless) }}'
  - name: fzf
    nameOverwrite:
      windows: junegunn.fzf
  # - gdu, ncdu
  - name: git-delta
    enabled: '{{ and (not (eq .osIDLike "debian")) }}'
    nameOverwrite:
      alpine: delta
      windows: dandavison.delta
  # - { name: glances, enabled: '{{ not (eq .osIDLike "debian") }}' }
  - name: glow
    enabled: '{{ not (eq .osIDLike "alpine" "debian") }}'
    nameOverwrite:
      windows: charmbracelet.glow
    # - gomi, gtrash
  - name: google-chrome
    enabled: '{{ and (eq .osIDLike "darwin" "windows") (not .headless) }}'
    nameOverwrite:
      # darwin: google-chrome{,beta,canary,dev}
      windows: Google.Chrome
    type: '{{ eq .osIDLike "darwin" | ternary "cask" nil }}'
  - name: gpg
    enabled: '{{ and (or .features.git .features.mail) (eq .osIDLike "alpine" "arch" "darwin" "debian") }}'
    nameOverwrite:
      android: gnupg
      arch: gnupg
      darwin: gnupg
      # debian: gnupg-agent
      windows: gnupg.gpg4win
  - name: gpg-tui
    enabled: '{{ not (eq .osIDLike "darwin" "debian" "fedora" "windows") }}'
  - { name: gzip, enabled: '{{ eq .osIDLike "alpine" }}' }
  # - hostctl
  # - htop
  - name: httm
    enabled: '{{ eq .osIDLike "arch" "darwin" }}'
    nameOverwrite:
      arch: httm-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  # - httpstat
  - name: hurl
    enabled: '{{ and (not  (eq .osID "arch")) (not (eq .osIDLike "alpine" "debian" "fedora")) }}'
    nameOverwrite:
      # alpine: hurl --repository http://dl-cdn.alpinelinux.org/alpine/edge/testing
      windows: Orange-OpenSource.Hurl
  # - name: hwinfo-tui
  #   enabled: '{{ eq .osIDLike "arch" "windows" }}'
  #   nameOverwrite:
  #     windows: JuanjoFuchs.hwinfo-tui
  #   type: '{{ eq .osIDLike "windows" | ternary "winget" "python" }}'
  - name: hyperfine
    enabled: '{{ eq .osIDLike "arch" "darwin" }}'
  - name: impala iwd
    enabled: '{{ and (eq .osIDLike "arch") (eq .chassisType "laptop") }}'
  # - name: incus incus-ui
  #   enabled: '{{ eq .osIDLike "arch" "darwin" }}'
  - name: ipinfo-cli
    enabled: '{{ eq .osIDLike "arch" "darwin" }}'
    nameOverwrite:
      arch: ipinfo-cli-bin
      windows: ipinfo.ipinfo
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: jq # sq
    nameOverwrite:
      windows: jqlang.jq
  - name: kmon # systeroid
    enabled: >
      {{ and (eq .os "linux") (not (eq .osID "fedora")) (not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04))
      )) }}
  - name: kubecolor
    enabled: '{{ and .features.kube (not (eq .osIDLike "alpine" "debian" "fedora")) }}'
    nameOverwrite:
      windows: Kubecolor.kubecolor
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: lazydocker # dry, sen
    enabled: '{{ and .features.docker (eq .osIDLike "arch" "darwin") }}'
    nameOverwrite:
      arch: lazydocker-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: lazyjournal
    enabled: '{{ and (eq .osIDLike "arch" "darwin") (ne .profile "minimal") }}'
    nameOverwrite:
      arch: lazyjournal-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: lazysql
    enabled: '{{ and .features.sql (eq .osIDLike "arch" "darwin") }}'
    nameOverwrite:
      arch: lazysql-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: lazyssh
    enabled: '{{ and .features.ssh (eq .osIDLike "arch" "darwin") }}'
    nameOverwrite:
      arch: lazyssh-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: lla # TODO: lla init && lla install
    enabled: '{{ eq .osID "arch" "darwin" }}'
    nameOverwrite:
      arch: lla-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - { name: lnav, enabled: '{{ ne .os "windows" }}' }
  # - name: mitmproxy # mitmweb # tproxy
  #   enabled: '{{ ne .os "windows" }}'
  #   type: '{{ eq .osIDLike "darwin" | ternary "cask" nil # (ne .osIDLike "arch" "debian" | ternary "python" nil) }}'
  - name: netscanner
    enabled: '{{ and (eq .osIDLike "arch" "darwin") (ne .profile "minimal") }}'
  - name: nvtop # nvitop, qmassa
    enabled: '{{ and (eq .os "linux") (not (eq .osIDLike "alpine" "debian")) (not .headless) }}'
  - name: openssh
    enabled: "{{ and .features.ssh }}" # (eq .osIDLike "arch" "darwin")
    nameOverwrite:
      debian: openssh-client
  # - name: pass # gopass
  #   enabled: '{{ not (empty .accessToken "") }}'
  - name: pastel # termipicker
    enabled: '{{ not (eq .osIDLike "alpine" "debian" "fedora") }}'
    nameOverwrite:
      windows: sharkdp.pastel
  - name: pipx
    enabled: '{{ and .features.python (eq .osIDLike "alpine" "darwin" "debian") (not (and (eq .osID "debian") (le (int .osVersion) 11))) }}'
  - name: podman-tui
    enabled: '{{ and .features.docker (not (eq .osIDLike "arch" "debian")) }}'
  - name: posting # slumber
    enabled: '{{ eq .osIDLike "arch" "darwin" }}'
    # type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
    type: '{{ eq .osIDLike "arch" | ternary "python" nil }}'
  - name: process-compose # hapless, mani+sake / cmdperf, mult
    enabled: '{{ eq .osIDLike "arch" "darwin" }}'
    nameOverwrite:
      darwin: f1bonacc1/tap/process-compose
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: procs
    enabled: >
      {{ not (or
        (and (eq .osID "debian") (le (int .osVersion) 12))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 24.04))
      ) }}
    nameOverwrite:
      windows: dalance.procs
  - { name: progress, enabled: '{{ eq .os "darwin" "linux" }}' }
  - name: pspg
    enabled: '{{ and .features.sql (eq .osIDLike "arch" "darwin") }}'
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: python
    enabled: '{{ and .features.python (eq .osIDLike "alpine" "android" "darwin" "debian") }}'
    nameOverwrite:
      alpine: python3
      # darwin: python@3.11
      debian: python3
  - name: ruby
    enabled: '{{ and .features.ruby (eq .osIDLike "alpine" "android" "debian" "fedora") }}'
    nameOverwrite:
      debian: ruby-dev
      fedora: ruby-devel
  - name: rubygems
    enabled: >
      {{ and .features.ruby (eq .osIDLike "arch" "debian" "fedora") (not
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04))
      ) }}
    nameOverwrite:
      debian: ruby-rubygems
  - name: s-tui
    # enabled: '{{ eq .osIDLike "arch" "debian" "fedora" }}'
    enabled: '{{ not (eq .osIDLike "android" "darwin" "windows") }}'
  - name: sd
    enabled: >
      {{ and (eq .osIDLike "alpine" "arch" "debian" "darwin" "windows") (not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04))
      )) }}
    nameOverwrite:
      windows: chmln.sd
  - name: shellcheck
    enabled: '{{ or (eq .osID "alpine") (not (or .features.neovim .features.mise)) }}'
    nameOverwrite:
      windows: koalaman.shellcheck
  - name: shpool # abduco, dtach
    enabled: '{{ and .features.shpool (not (eq .osIDLike "darwin" "windows")) }}'
    type: '{{ eq .osIDLike "arch" | ternary "aur" "cargo" }}'
  # https://github.com/skim-rs/skim#shell-completions
  - name: skim
    enabled: '{{ not (eq .osIDLike "windows") }}'
    nameOverwrite:
      darwin: sk
    type: '{{ eq .osIDLike "debian" | ternary "cargo" nil }}' # .features.rust
  # - name: ssh-list
  #   enabled: '{{ and .features.ssh (not (eq .osIDLike "alpine" "debian" "fedora" "windows")) }}'
  #   type: '{{ eq .osIDLike "arch" | ternary "aur" "cargo" }}'
  - name: sshs # sshclick, ssm, fast-ssh
    enabled: '{{ and .features.ssh (not (eq .osIDLike "alpine" "debian" "fedora" "windows")) }}'
  - name: starship
    enabled: '{{ not (eq .osIDLike "alpine" "debian" "fedora") }}'
    nameOverwrite:
      windows: Starship.Starship
  - name: steam
    enabled: "{{ .features.steam }}"
  - name: steamlink
    enabled: "{{ .features.steam }}"
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: subliminal
    enabled: '{{ and (eq .osIDLike "arch" "darwin" "windows") (eq .profile "personal") }}'
    type: '{{ eq .osIDLike "arch" | ternary "aur" "python" }}'
  # - swaptop
  - name: tailspin
    type: '{{ eq .osIDLike "alpine" "debian" "fedora" | ternary "cargo" (eq .osIDLike "windows" | ternary "scoop" nil) }}'
  - name: termscp # aim, zrok
    enabled: '{{ and (eq .osIDLike "arch" "darwin") (ne .profile "minimal") }}'
  - name: tidy
    nameOverwrite:
      darwin: tidy-html5
      windows: HTACG.tidy
    enabled: "{{ .features.neovim }}"
  - name: tlp
    enabled: '{{ and (eq .osIDLike "arch") (eq .chassisType "laptop") }}'
  - name: tofuref # terraform-tui
    enabled: "{{ and .features.tofu .features.python }}"
    type: python
  - name: tokei # cloctui, scc
    enabled: '{{ and (eq .osIDLike "arch" "darwin") (ne .profile "minimal") }}'
  - name: tracexec
    enabled: '{{ and (eq .osIDLike "arch") (ne .profile "minimal") }}'
  - name: tre-command
    enabled: >
      {{ and (not (eq .osIDLike "alpine" "arch" "fedora")) (not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04))
      )) }}
    nameOverwrite:
      windows: duan.tre
  - name: tuptime
    enabled: >
      {{ and (eq .os "linux") (not (eq .osID "alpine" "fedora")) (not .ephemeral) (not (or
        (and (eq .osID "debian") (le (int .osVersion) 1))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 24.04))
      )) }}
    type: '{{ eq .osIDLike "arch" | ternary "aur" "python" }}'
  # - name: tz # tzupdate
  #   enabled: '{{ and (eq .osIDLike "arch" "darwin") (ne .profile "minimal") }}'
  #   # nameOverwrite:
  #   #   go: github.com/oz/tz
  #   type: '{{ eq .osIDLike "arch" | ternary "aur" (ne .os "darwin" | ternary "go" "nil") }}'
  - name: ugm
    enabled: '{{ not (eq .osIDLike "darwin" "debian" "fedora" "windows") }}'
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  - name: uv
    enabled: '{{ and .features.python (eq .osIDLike "alpine" "android" "arch" "fedora" "windows") }}'
    nameOverwrite:
      windows: astral-sh.uv
  - { name: util-linux, enabled: '{{ eq .os "linux" }}' }
  - name: viddy # watch
    enabled: '{{ and (eq .osIDLike "alpine" "arch" "darwin") (ne .profile "minimal") }}'
    nameOverwrite:
      arch: viddy-bin
    type: '{{ eq .osIDLike "arch" | ternary "aur" nil }}'
  # - name: vlc # mpv
  #   enabled: '{{ and (not (eq .osIDLike "alpine" "darwin" "debian")) (not .headless) }}'
  #   nameOverwrite:
  #     arch: vlc vlc-plugins-all
  #     windows: VideoLAN.VLC
  - { name: xdg-utils, enabled: '{{ eq .osIDLike "alpine" "arch" }}' }
  - name: yq
    enabled: >
      {{ not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04))
      ) }}
    nameOverwrite:
      windows: mikefarah.yq
  # - name: zen
  #   enabled: '{{ and (eq .osIDLike "darwin") (not (or .ephemeral .headless)) }}'
  #   type: '{{ eq .osIDLike "darwin" | ternary "cask" nil }}'
  - name: zoxide
    enabled: '{{ not (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04)) }}'
    nameOverwrite:
      windows: ajeetdsouza.zoxide
extraPackages: []
