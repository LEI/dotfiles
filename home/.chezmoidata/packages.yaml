---
# FIXME(archlinux): rust/rustup jack2/pipewire-jack man-db/mandoc
# https://www.chezmoi.io/user-guide/advanced/install-packages-declaratively/
commonPackages:
  - name: autossh
    condition: and .features.ssh (not (eq .osIDLike "debian" "windows"))
  - name: bandwhich
    condition: not (eq .osIDLike "debian" "fedora" "windows")
  - name: bkt
    condition: not (eq .osIDLike "alpine" "debian" "fedora" "windows")
    type: eq .osIDLike "arch" | ternary "aur" nil
  - { name: build-base, condition: eq .osIDLike "alpine" }
  # - { name: below, condition: not (eq .osIDLike "arch" "debian") }
  - name: bottom
    condition: not (eq .osIDLike "debian" "fedora")
    nameOverwrite:
      windows: clement.bottom
  - name: cargo-binstall
    condition: and .features.rust (not (eq .osIDLike "alpine" "debian" "fedora"))
  - name: claude-code
    condition: and .features.ai (eq .osIDLike "arch" "darwin" "windows")
    nameOverwrite:
      windows: Anthropic.Claude
    type: eq .osIDLike "arch" | ternary "aur" (eq .osIDLike "darwin" | ternary "cask" nil)
  # - name: claude
  #   condition: and .features.ai (eq .osIDLike "darwin" "windows") (not .headless)
  #   nameOverwrite:
  #     windows: Anthropic.ClaudeCode
  #   type: eq .osIDLike "darwin" | ternary "cask" nil
  - name: codex
    condition: and .features.ai (eq .osIDLike "arch" "darwin")
    nameOverwrite:
      arch: openai-codex-bin
      # npm: @openai/codex
    type: eq .osIDLike "arch" | ternary "aur" nil
  - { name: coreutils, condition: eq .os "linux" }
  - name: cotp
    condition: ne .profile "minimal"
  - name: crush
    condition: and .features.ai (eq .osIDLike "arch" "darwin" "windows")
    nameOverwrite:
      arch: crush-bin
      darwin: charmbracelet/tap/crush
      # npm: @charmland/crush
      windows: charmbracelet.crush
    type: eq .osIDLike "arch" | ternary "aur" nil
  - name: curl
    nameOverwrite:
      windows: cURL.cURL
  - name: difftastic
    condition: ne .osIDLike "debian"
    nameOverwrite:
      windows: wilfred.difftastic
  - name: direnv
    nameOverwrite:
      windows: direnv.direnv
  - name: dive
    condition: and .features.docker (not (eq .osID "alpine" "fedora"))
    nameOverwrite:
      windows: wagoodman.dive # scoop: main/dive
  # - dog, doggo, dstp, mtr, trippy, oryx
  # - dua, dug
  # - duf, dysk
  - name: dust # deletor, diskonaut, gdu, kondo, pdu, wiper
    condition: not (eq .osIDLike "debian")
    nameOverwrite:
      windows: bootandy.dust
  # - name: fancy-cat
  #   condition: eq .osIDLike "arch" "darwin"
  #   type: eq .osIDLike "arch" | ternary "aur" nil
  - name: fd
    condition: ne .osIDLike "debian"
    nameOverwrite:
      windows: sharkdp.fd
  - name: firefox
    condition: and (eq .osIDLike "darwin" "windows") (not .headless)
    nameOverwrite:
      windows: Mozilla.Firefox # .DeveloperEdition
    type: eq .osIDLike "darwin" | ternary "cask" nil
  # - name: foot
  #   condition: and .features.sway (not (eq .osIDLike "darwin" "debian" "windows")) (not .headless)
  - name: fzf
    nameOverwrite:
      windows: junegunn.fzf
  # - gdu, ncdu
  - name: git-delta
    condition: and (not (eq .osIDLike "debian"))
    nameOverwrite:
      alpine: delta
      windows: dandavison.delta
  # - { name: glances, condition: not (eq .osIDLike "debian") }
  - name: glow
    condition: not (eq .osIDLike "alpine" "debian")
    nameOverwrite:
      windows: charmbracelet.glow
  # - gomi, gtrash
  - name: google-chrome
    condition: and (eq .osIDLike "darwin" "windows") (not .headless)
    nameOverwrite:
      windows: Google.Chrome
    type: eq .osIDLike "darwin" | ternary "cask" nil
  - name: gpg
    condition: and (or .features.git .features.mail) (eq .osIDLike "alpine" "arch" "darwin" "debian")
    nameOverwrite:
      android: gnupg
      arch: gnupg
      darwin: gnupg
      windows: gnupg.gpg4win
  - name: gpg-tui
    condition: not (eq .osIDLike "darwin" "debian" "fedora" "windows")
  - { name: gzip, condition: eq .osIDLike "alpine" }
  # - hostctl
  # - htop
  - name: httm
    condition: eq .osIDLike "arch" "darwin"
    nameOverwrite:
      arch: httm-bin
    type: eq .osIDLike "arch" | ternary "aur" nil
  # - httpstat
  - name: hurl
    condition: ne .osIDLike "debian"
    nameOverwrite:
      alpine: hurl --repository http://dl-cdn.alpinelinux.org/alpine/edge/testing
  - name: hyperfine
    condition: eq .osIDLike "arch" "darwin"
  - name: incus
    condition: eq .osIDLike "arch" "darwin"
  - name: ipinfo-cli
    condition: eq .osIDLike "arch" "darwin"
    nameOverwrite:
      arch: ipinfo-cli-bin
      windows: ipinfo.ipinfo
    type: eq .osIDLike "arch" | ternary "aur" nil
  - name: jq
    nameOverwrite:
      windows: jqlang.jq
  - name: kmon
    condition: >
      and (eq .os "linux") (not (eq .osID "fedora")) (not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04))
      ))
  - name: kubecolor
    condition: and .features.kube (not (eq .osIDLike "alpine" "debian" "fedora"))
    nameOverwrite:
      windows: Kubecolor.kubecolor
    type: eq .osIDLike "arch" | ternary "aur" nil
  - { name: lnav, condition: ne .os "windows" }
  # - name: mitmproxy # mitmweb
  #   condition: ne .os "windows"
  #   type: eq .osIDLike "darwin" | ternary "cask" nil # (ne .osIDLike "arch" "debian" | ternary "uv" nil)
  - name: nvtop # nvitop
    condition: and (eq .os "linux") (not (eq .osIDLike "alpine" "debian")) (not .headless)
  - name: openssh
    condition: and .features.ssh # (eq .osIDLike "arch" "darwin")
  # - name: pass # gopass
  #   condition: not (empty .accessToken "")
  - name: pastel
    condition: not (eq .osIDLike "alpine" "debian" "fedora")
    nameOverwrite:
      windows: sharkdp.pastel
  - name: pipx
    condition: and .features.python (eq .osIDLike "alpine" "darwin" "debian") (not (and (eq .osID "debian") (le (int .osVersion) 11)))
  - name: podman-tui
    condition: and .features.docker (not (eq .osIDLike "arch" "debian"))
  - name: posting
    condition: eq .osIDLike "arch" "darwin"
    type: eq .osIDLike "arch" | ternary "aur" nil
  - name: procs
    condition: not (eq .osIDLike "debian")
    nameOverwrite:
      windows: dalance.procs
  - { name: progress, condition: eq .os "linux" }
  - name: python
    condition: and .features.python (eq .osIDLike "alpine" "android" "darwin" "debian")
    nameOverwrite:
      alpine: python3
      darwin: python # @3.11
      debian: python3
  - name: ruby
    condition: and .features.ruby (eq .osIDLike "alpine" "android" "debian" "fedora")
    nameOverwrite:
      debian: ruby-dev
      fedora: ruby-devel
  - name: rubygems
    condition: and .features.ruby (eq .osIDLike "arch" "debian" "fedora") (not (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04)))
    nameOverwrite:
      debian: ruby-rubygems
  - name: s-tui
    # condition: eq .osIDLike "arch" "debian" "fedora"
    condition: not (eq .osIDLike "android" "darwin" "windows")
  - name: shellcheck
    condition: or (eq .osID "alpine") (not (or .features.neovim .features.mise))
    nameOverwrite:
      windows: koalaman.shellcheck
  # https://github.com/ghostty-org/ghostty/issues/189
  # https://github.com/shell-pool/shpool/issues/240
  - name: shpool # abduco, dtach
    condition: and .features.shpool (not (eq .osIDLike "darwin" "windows"))
    type: eq .osIDLike "arch" | ternary "aur" "cargo"
  # https://github.com/skim-rs/skim#shell-completions
  - name: skim
    condition: not (eq .osIDLike "windows")
    nameOverwrite:
      darwin: sk
    type: eq .osIDLike "debian" | ternary "cargo" nil # .features.rust
  - name: sshs # sshclick, ssm, fast-ssh
    condition: and .features.ssh (not (eq .osIDLike "alpine" "debian" "fedora" "windows"))
  - name: starship
    condition: not (eq .osIDLike "alpine" "debian" "fedora")
    nameOverwrite:
      windows: Starship.Starship
  - name: tailspin
    type: eq .osIDLike "alpine" "debian" "fedora" | ternary "cargo" (eq .osIDLike "windows" | ternary "scoop" nil)
  - name: tokei # scc
    condition: eq .osIDLike "arch" "darwin"
  - name: tre-command
    condition: >
      and (not (eq .osIDLike "alpine" "arch" "fedora")) (not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04))
      ))
    nameOverwrite:
      windows: duan.tre
  - name: tuptime
    condition: eq .os "linux"
    type: eq .osIDLike "arch" | ternary "aur" "uv"
  - name: ugm
    condition: not (eq .osIDLike "darwin" "debian" "fedora" "windows")
    type: eq .osIDLike "arch" | ternary "aur" nil
  - name: uv
    condition: and .features.python (eq .osIDLike "alpine" "android" "windows")
    nameOverwrite:
      windows: astral-sh.uv
  - { name: util-linux, condition: eq .os "linux" }
  - name: vlc # mpv
    condition: and (not (eq .osIDLike "alpine" "darwin" "debian")) (not .headless)
    nameOverwrite:
      arch: vlc vlc-plugins-all
      windows: VideoLAN.VLC
  - name: wget
    nameOverwrite:
      windows: JernejSimoncic.Wget
  - name: yq
    condition: >
      not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04))
      )
    nameOverwrite:
      windows: mikefarah.yq
  - name: zoxide
    condition: not (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04))
    nameOverwrite:
      windows: ajeetdsouza.zoxide
extraPackages: []
