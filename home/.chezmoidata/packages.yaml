---
# https://www.chezmoi.io/user-guide/advanced/install-packages-declaratively/
commonPackages:
  - { name: bandwhich, condition: not (eq .osIDLike "debian" "fedora") }
  - { name: build-base, condition: eq .osIDLike "alpine" }
  # - { name: below, condition: not (eq .osIDLike "arch" "debian") }
  - { name: bottom, condition: not (eq .osIDLike "debian" "fedora") }
  - name: cargo-binstall
    condition: and .features.rust (not (eq .osIDLike "alpine" "debian" "fedora"))
  - { name: coreutils, condition: eq .chezmoi.os "linux" }
  # - name: dive
  #   condition: and .features.docker (ne .osID "alpine")
  - name: difftastic
    condition: ne .osIDLike "debian"
  # - dog, doggo, dstp, mtr, trippy
  # - dua, dug
  # - duf, dysk
  - name: dust # deletor, diskonaut, gdu, kondo, pdu, wiper
    condition: not (eq .osIDLike "debian")
  - { name: fd, condition: ne .osIDLike "debian" }
  - fzf
  # - gdu, ncdu
  - name: git-delta
    condition: and (not (eq .osIDLike "debian"))
    nameOverwrite:
      alpine: delta
  # - { name: glances, condition: not (eq .osIDLike "debian") }
  - { name: glow, condition: not (eq .osIDLike "alpine" "debian") }
  # - gomi, gtrash
  - { name: gpg, condition: eq .osIDLike "alpine" "darwin" "debian" }
  - { name: gpg-tui, condition: not (eq .osIDLike "debian" "fedora") }
  - { name: gzip, condition: eq .osIDLike "alpine" }
  # - hostctl
  # - htop
  # - httm
  # - httpstat
  - jq
  - name: kmon
    condition: >
      and (eq .chezmoi.os "linux") (not (eq .osID "fedora")) (not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04))
      ))
  - lnav
  - name: nvtop # nvitop
    condition: and (eq .chezmoi.os "linux") (not (eq .osIDLike "alpine" "debian")) (not .headless)
  # - name: pass # gopass
  #   condition: ne .accessToken ""
  - name: pastel
    condition: not (eq .osIDLike "alpine" "debian" "fedora")
  - name: pipx
    condition: and .features.python (eq .osIDLike "alpine" "darwin") (not (and (eq .osID "debian") (le (int .osVersion) 11)))
  - name: podman-tui
    condition: and .features.docker (not (eq .osIDLike "arch" "debian"))
  - { name: procs, condition: not (eq .osIDLike "debian") }
  - { name: progress, condition: eq .chezmoi.os "linux" }
  - name: python3
    condition: and .features.python (eq .osIDLike "alpine" "debian")
  - name: ruby
    condition: and .features.ruby (eq .osIDLike "alpine" "android" "fedora")
    nameOverwrite:
      debian: ruby-dev
      fedora: ruby-devel
  - name: ruby-rubygems
    condition: and .features.ruby (eq .osIDLike "arch" "fedora") (not (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04)))
    nameOverwrite:
      fedora: rubygems
  # - { name: shellcheck, condition: .features.not neovim }
  - name: skim
    condition: not (eq .osIDLike "debian")
  - name: sshs # sshclick, ssm, fast-ssh
    condition: not (eq .osIDLike "alpine" "debian" "fedora")
  - name: starship
    condition: not (eq .osIDLike "alpine" "debian" "fedora")
  - name: tre-command
    condition: >
      and (not (eq .osIDLike "alpine" "arch" "fedora")) (not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04))
      ))
  - { name: tuptime, condition: not (eq .osIDLike "alpine" "arch") }
  - { name: util-linux, condition: eq .chezmoi.os "linux" }
  - name: vlc # mpv
    condition: and (not (eq .osIDLike "alpine" "darwin" "debian")) (not .headless)
  - name: yq
    condition: >
      not (or
        (and (eq .osID "debian") (le (int .osVersion) 11))
        (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04))
      )
  - name: zoxide
    condition: not (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04))
extraPackages: []
packages:
  alpine:
    apk:
      - tar
      - xdg-utils # xdg-open
      - xz

      # NOTE(ble.sh): /lib/bash/{fdflags,sleep}: No such file or directory
      # builtin: fdflags: not a shell builtin
      # enable: cannot open shared object /lib/bash/sleep

      # Build node (mise)
      # - g++
      # - linux-headers
      # - make

      # Cargo gitlab-ci-ls
      - openssl-dev
      # https://github.com/sfackler/rust-openssl/issues/2185
      - openssl-libs-static
  android:
    termux:
      - gnupg
      - less
      - proot
      - { name: python, condition: .features.python }
      - sudo
      - { name: uv, condition: .features.python }
      - which
  arch: # Archlinux/Manjaro
    pacman:
      - base-devel
      - ddgr
      - gnu-netcat
      - gnupg
      - systemctl-tui
      - time # condition: command time
      - tokei
      - wiki-tui # so
      - wikiman arch-wiki-docs
      # - { name: yay, condition: eq .osID "manjaro" }
    aur:
      # - below
      - { name: lazydocker-bin, condition: .features.docker }
      - lazyjournal-bin
      - { name: lazysql-bin, condition: .features.sql }
      - pacseek-bin
      - { name: podman-tui-bin, condition: .features.docker }
      - tuptime
      - tre-command-bin
      # - { name: terraform-pug-bin, condition: .features.tofu } # terraform-tui, tofuref
      # - { name: yay, condition: ne .osID "manjaro" }
  darwin:
    brew:
      # - { name: git-cc, condition: .features.git }
      - { name: lazydocker, condition: .features.docker }
      - lazyjournal
      - { name: lazysql, condition: .features.sql }
      # - { name: leg100/tap/pug, condition: .features.tofu }
      - sk
      - gromgit/brewtils/taproom
      - tokei
    cask:
      - firefox
      - google-chrome
      - vlc
  debian: # Debian/Ubuntu
    apt:
      - apt-utils
      - build-essential
      - time # condition: command time

      # Cargo gitlab-ci-ls
      - pkg-config
      - libssl-dev

      # Debian devcontainer
  fedora:
    dnf:
      - openssl-devel
      - procps
      # - unzip
      # - which
  windows:
    scoop:
      # - main/dive
      - sudo
    winget:
      - clement.bottom
      # - dandavison.delta
      # - { name: wagoodman.dive, condition: .features.docker }
      - bootandy.dust
      - sharkdp.fd
      # - dundee.gdu
      - jdx.mise
      - jqlang.jq
      - dalance.procs
      # - { name: koalaman.shellcheck, condition: not .features.neovim }
      - { name: astral-sh.uv, condition: .features.python }
      - videolan.vlc
      - mikefarah.yq
      - ajeetdsouza.zoxide
    # - { name: golang.go, condition: .features.go }
packageManagerMap:
  alpine: apk
  android: termux # pkg
  arch: pacman
  darwin: brew
  debian: apt
  fedora: dnf
