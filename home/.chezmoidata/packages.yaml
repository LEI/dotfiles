---
# https://www.chezmoi.io/user-guide/advanced/install-packages-declaratively/
commonPackages:
  - { name: atuin, condition: eq .osIDLike "arch" "darwin" }
  - { name: bat, windows: sharkdp.bat }
  - { name: bandwhich, condition: not (eq .osIDLike "debian" "windows") }
  # - { name: below, condition: not (eq .osIDLike "arch" "debian" "windows") }
  - { name: bottom, condition: ne .osIDLike "debian", windows: clement.bottom }
  - curl
  - { name: coreutils, condition: eq .chezmoi.os "linux" }
  - name: dust
    condition: not (eq .osIDLike "debian")
    windows: bootandy.dust
  - name: eza
    condition: not (or (eq .osID "debian") (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04)))
    windows: eza-community.eza
  - { name: fd, condition: ne .osIDLike "debian", windows: sharkdp.fd }
  - git
  # - { name: gdu, windows: dundee.gdu }
  # - { name: glances, condition: not (eq .osIDLike "debian" "windows") }
  - { name: gpg-tui, condition: not (eq .osIDLike "debian" "windows") }
  - name: helix
    condition: and .features.helix (ne .osIDLike "debian")
  - { name: jq, windows: jqlang.jq }
  - { name: lnav, condition: not (eq .osID "windows") }
  - name: neovim
    # condition: and .features.neovim (ne .osIDLike "debian")
    condition: and .features.neovim (not .glibc231)
  - { name: nushell, condition: ne .osIDLike "debian" }
  - { name: playerctl, condition: and .features.tmux (eq .chezmoi.os "linux") }
  - { name: procs, condition: not (eq .osIDLike "debian" "windows") }
  - { name: progress, condition: eq .chezmoi.os "linux" }
  - { name: ripgrep, windows: BurntSushi.ripgrep.MSVC }
  # - { name: shellcheck, condition: .features.not neovim, windows: koalaman.shellcheck }
  - name: starship
    condition: ne .osIDLike "debian"
  - name: topgrade
    condition: not (eq .osIDLike "arch" "debian")
  - { name: util-linux, condition: eq .chezmoi.os "linux" }
  - name: vim
    condition: .features.vim
  - name: yq
    condition: not (or (and (eq .osID "debian") (le (int .osVersion) 11)) (and (eq .osID "ubuntu") (le (float64 .osVersion) 22.04)))
    windows: MikeFarah.yq
  - name: zoxide
    condition: not (and (eq .osID "ubuntu") (le (float64 .osVersion) 20.04))
    windows: ajeetdsouza.zoxide
packages:
  alpine:
    - bash
    - build-base # gcc
    - gpg
    - gzip
    - { name: nodejs, condition: .features.node }
    - { name: npm, condition: .features.node }
    - skim
    - tar
    - xdg-utils # xdg-open
    - xz

    # NOTE(ble.sh): /lib/bash/{fdflags,sleep}: No such file or directory
    # builtin: fdflags: not a shell builtin
    # enable: cannot open shared object /lib/bash/sleep

    # Build node (mise)
    # - g++
    # - linux-headers
    # - make
    - { name: pipx, condition: .features.python }
    - { name: python3, condition: .features.python }

    # Cargo gitlab-ci-ls
    - openssl-dev
    # https://github.com/sfackler/rust-openssl/issues/2185
    - openssl-libs-static
  android:
    - gnupg
    - less
    - { name: nodejs, condition: .features.node }
    - proot
    - skim
    - sudo
    - which
  arch: # Archlinux/Manjaro
    - base-devel
    # - { name: below, type: '"aur"' }
    - { name: carapace-bin, type: '"aur"' }
    - gnu-netcat
    - gnupg
    - name: helixbinhx
      condition: and .features.helix (eq .osIDLike "arch")
      type: '"aur"'
    - name: terraform-pug-bin
      condition: .features.tofu
      type: '"aur"'
    - skim
    - time # condition: command time
    - name: topgrade-bin
      type: eq .osID "manjaro" | ternary "aur" ""
    # https://github.com/Jguer/yay#other-distributions
    - { name: yay, condition: eq .osIDLike "manjaro" }
  darwin:
    brews:
      - carapace
      - gpg
      - { name: nowplaying-cli, condition: .features.tmux }
      - { name: leg100/tap/pug, condition: .features.tofu }
      - { name: reattach-to-user-namespace, condition: .features.tmux }
      - sk
    casks:
      - firefox
      - google-chrome
  debian: # Debian/Ubuntu
    - apt-utils
    - build-essential
    - gpg
    - time # condition: command time

    # Cargo gitlab-ci-ls
    - pkg-config
    - libssl-dev # openssl-devel on Fedora

    # Debian devcontainer
    - name: pipx
      condition: and .features.python (or (ne .osID "debian") (gt (int .osVersion) 11))
    - { name: python3, condition: .features.python }
    - { name: python3-venv, condition: .features.python }
  # fedora:
  #   - openssl-devel
  windows:
    - jdx.mise
    # - { name: golang.go, condition: .features.go }
    # - { name: openjs.nodejs, condition: .features.node }
    # - { name: openjs.nodejs.lts, condition: .features.node }
