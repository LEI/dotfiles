---
# https://models.dev/api.json
ai:
  # Provider: inference source identified by api protocol
  # Local: port + health for service management, optional domain for reverse proxy
  # Cloud: base_url + env for client config
  # See .chezmoi.yaml.tmpl for computed active flags and service type
  #
  # dot_config/caddy: reverse proxy from domain + port
  # dot_config/goss: health check via addr + port + http
  # dot_config/opencode/opencode.jsonc: local provider blocks
  # dot_config/oage/bifrost/config.json: mlx-lm port
  # dot_config/oage/compose.yaml: mlx-lm and ollama port
  # dot_config/mlx-lm/setup: mlx-lm port and label
  # dot_config/llama-cpp/setup: llama-server port
  # Library/LaunchAgents/*.plist: mlx-lm, mlx-embed, llama-server ports
  # dot_ollama, .chezmoiscripts
  providers:
    # Local
    llama-server:
      api: openai
      health: /health
      label: com.llama-cpp.server
      port: 11437
      domain: llama-cpp.test
    mlx-embed:
      api: openai
      health: /v1/models
      label: com.mlx-embed.server
      server: mlx-openai-server
      port: 11445
    mlx-lm:
      api: openai
      body: '{"object": "list"'
      health: /v1/models
      label: com.mlx-lm.server
      # server: mlx_lm.server, mlx-omni-server, mlx-openai-server
      server: mlx_lm.server
      port: 11435
      domain: mlx-lm.test
    ollama:
      api: ollama
      port: 11434
      domain: ollama.test
      health: /
      caddy:
        header_up: Host localhost
    vllm-mlx:
      api: openai
      health: /v1/models
      port: 11436
      domain: vllm-mlx.test

    # Cloud
    anthropic:
      api: anthropic
      env: ANTHROPIC_API_KEY
    github-copilot:
      api: copilot
    huggingface:
      api: openai
      base_url: https://router.huggingface.co/v1
      env: HF_TOKEN
    ollama-cloud:
      api: openai
      base_url: https://ollama.com/v1
      env: OLLAMA_API_KEY
    openrouter:
      api: openai
      base_url: https://openrouter.ai/api/v1
      env: OPENROUTER_API_KEY
    # https://dev.synthetic.new/docs/api/overview
    synthetic:
      api: openai
      base_url: https://api.synthetic.new/openai/v1
      env: SYNTHETIC_API_KEY
    zai:
      api: openai
      base_url: https://api.z.ai/api/paas/v4
      env: ZAI_API_KEY
    zai-coding-plan:
      api: openai
      base_url: https://api.z.ai/api/coding/paas/v4
      env: ZAI_API_KEY
    # Built-in providers (no config needed, referenced in profiles only):
    # opencode, opencode-go

  # Model: shared metadata and per-provider IDs
  # type: chat (generation) or embedding
  # reasoning: supports extended thinking / chain of thought
  # tool_call: supports function calling
  # cpu: can run on CPU without GPU acceleration
  # Per-provider keys (mlx-lm, ollama): provider-specific model ID
  #
  # dot_config/opencode/opencode.jsonc: context window, provider IDs
  # dot_logseq/settings/ollama-logseq.json: ollama ID for fast role
  # dot_config/oage/setup-open-notebook: provider IDs for role mapping
  models:
    nomic-embed:
      type: embedding
      context: 8192
      mlx-lm: mlx-community/all-MiniLM-L6-v2-4bit
      ollama: nomic-embed-text
    qwen3-4b:
      type: chat
      context: 262144
      output: 65536
      reasoning: true
      tool_call: true
      cpu: true
      mlx-lm: mlx-community/Qwen3.5-4B-MLX-4bit
      ollama: qwen3.5:4b
    qwen3-9b:
      type: chat
      context: 262144
      output: 65536
      reasoning: true
      tool_call: true
      cpu: true
      mlx-lm: mlx-community/Qwen3.5-9B-MLX-4bit
      ollama: qwen3.5:9b
    gemma4:
      type: chat
      context: 131072
      output: 8192
      reasoning: true
      tool_call: true
      mlx-lm: mlx-community/gemma-4-e4b-it-4bit
      ollama: gemma4
      params:
        reasoning_tags:
          - "<|channel>thought"
          - "<channel|>"
    # qwen3-coder-30b:
    #   type: chat
    #   context: 262144
    #   output: 65536
    #   reasoning: true
    #   tool_call: true
    #   mlx-lm: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
    #   ollama: qwen3-coder:30b-a3b-q4_K_M

  # Profile: named set of role-to-model mappings
  # Roles: chat, coding, embedding, fast, reasoning
  # Format: "provider/model-id" for cloud, bare model name for local
  #
  # dot_config/opencode/opencode.jsonc: coding, fast, reasoning
  # dot_config/pi/agent/settings.json: coding (split on / for provider + model)
  # dot_config/oage/setup-open-notebook: chat, coding, embedding
  # dot_logseq/settings/ollama-logseq.json: fast
  profiles:
    local:
      chat: qwen3-9b
      coding: qwen3-9b
      embedding: nomic-embed
      fast: qwen3-4b
      reasoning: qwen3-9b
    mlx-local:
      chat: mlx-lm/mlx-community/gemma-4-e4b-it-4bit
      coding: mlx-lm/mlx-community/Qwen3.5-9B-MLX-4bit
      embedding: mlx-embed/mlx-community/all-MiniLM-L6-v2-4bit
      fast: mlx-lm/mlx-community/Qwen3.5-4B-MLX-4bit
      reasoning: mlx-lm/mlx-community/Qwen3.5-9B-MLX-4bit
    ollama-local:
      chat: ollama/gemma4
      coding: ollama/qwen3.5:9b
      embedding: ollama/nomic-embed-text
      fast: ollama/qwen3.5:4b
      reasoning: ollama/qwen3.5:9b

    copilot-pro:
      chat: github-copilot/gpt-4o
      coding: github-copilot/gpt-4.1
      fast: github-copilot/gpt-5-mini
      reasoning: github-copilot/gpt-4o
    copilot-pro-standard:
      chat: github-copilot/gpt-4o
      coding: github-copilot/gpt-5.1-codex
      fast: github-copilot/gpt-4o
      reasoning: github-copilot/gpt-4o
    copilot-pro-premium:
      chat: github-copilot/gpt-4o
      coding: github-copilot/claude-sonnet-4.6
      fast: github-copilot/gpt-4o
      reasoning: github-copilot/claude-opus-4.6

    ollama-cloud:
      chat: ollama-cloud/gpt-oss:120b
      coding: ollama-cloud/qwen3-coder:480b
      fast: ollama-cloud/gpt-oss:20b
      reasoning: ollama-cloud/deepseek-v3.1:671b

    opencode-zen:
      chat: opencode/big-pickle
      coding: opencode/big-pickle
      fast: opencode/gpt-5-nano
      reasoning: opencode/big-pickle
    opencode-go:
      chat: opencode-go/kimi-k2.5
      coding: opencode-go/glm-5
      fast: opencode-go/minimax-m2.5
      reasoning: opencode-go/minimax-m2.7

    openrouter:
      chat: openrouter/qwen/qwen3-coder-30b-a3b-instruct
      coding: openrouter/qwen/qwen3-coder
      fast: openrouter/qwen/qwen3-coder-30b-a3b-instruct
      reasoning: openrouter/deepseek/deepseek-r1-distill-llama-70b
    openrouter-auto:
      chat: openrouter/auto
      coding: openrouter/auto
      fast: openrouter/auto
      reasoning: openrouter/auto
    openrouter-free:
      chat: openrouter/free
      coding: openrouter/free
      fast: openrouter/free
      reasoning: openrouter/free

    huggingface:
      chat: huggingface/Qwen/Qwen3-Next-80B-A3B-Instruct
      coding: huggingface/Qwen/Qwen3-Coder-480B-A35B-Instruct
      fast: huggingface/Qwen/Qwen3-Coder-Next
      reasoning: huggingface/Qwen/Qwen3-Next-80B-A3B-Instruct

    synthetic:
      chat: synthetic/glm-4.7
      coding: synthetic/glm-4.7
      fast: synthetic/glm-4.5-air
      reasoning: synthetic/glm-4.7

    zai-coding-plan-lite:
      chat: zai-coding-plan/glm-4.7
      coding: zai-coding-plan/glm-4.7
      fast: zai-coding-plan/glm-4.5-air
      reasoning: zai-coding-plan/glm-4.7
    zai-coding-plan-pro:
      chat: zai-coding-plan/glm-4.7
      coding: zai-coding-plan/glm-5.1
      fast: zai-coding-plan/glm-4.6
      reasoning: zai-coding-plan/glm-5-turbo
    zai-coding-plan-max:
      chat: zai-coding-plan/glm-4.7
      coding: zai-coding-plan/glm-5.1
      fast: zai-coding-plan/glm-4.7
      reasoning: zai-coding-plan/glm-5
