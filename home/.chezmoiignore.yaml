---
# os: patterns ignored on all OSes EXCEPT the key (.chezmoi.os: linux, darwin, windows)
# features: patterns ignored when the feature key is NOT enabled
os:
  darwin:
    - .bash_profile
    - .chezmoiscripts/darwin/**
    - .config/duti/
    - .config/hammerspoon/
    - .config/karabiner/
    - .hushlogin
    - .macos
    - Library/
  linux:
    - .chezmoiscripts/linux/**
    - .config/Claude/ # Fedora
    - .config/systemd/
    - .hushlogin
  windows:
    - "*.ps1"
    - .chezmoiscripts/windows/**
    - .config/powershell/ # not .wsl
    - .config/winget/
    - Documents/
    # - Documents/PowerShell/
    # - Documents/WindowsPowerShell/
features:
  ai:
    - .config/mcphub/
    - .config/mcporter/
    - .config/pi/
    - .config/utcp/
    - .mcporter/
  claude:
    - .claude/
    - .config/claude/
    - .config/Claude/
    - .config/markdownlint/claude.yaml
    - Library/Application Support/Claude/
  goose:
    - .config/goose/
  opencode:
    - .config/opencode/
    - .config/systemd/user/opencode.service
    - .openpackage/
    - Library/LaunchAgents/com.opencode.plist
  atuin:
    - .config/atuin/
  bash:
    # - .bash_aliases
    - .bash_profile
    - .bashrc
    - .config/bash/
    - .config/blesh/
  bat:
    - .config/bat/
  caddy:
    - .config/caddy/
  zsh:
    - .config/zsh/
    - .zprofile
    - .zshrc
  carapace:
    - .config/carapace/
  brew:
    - .chezmoiscripts/*install-brew-packages.sh
    - .config/homebrew/
  direnv:
    - .config/direnv/
  docker:
    - .config/carapace/specs/d.yaml
    - .config/docker/
  eza:
    - .config/eza/
  fd:
    - .config/fd/
  podman:
    - .config/carapace/specs/p.yaml
    - .config/podman/
  ghostty:
    - .config/ghostty/
  git:
    # NOTE: feature should be named "git-config"
    - .config/carapace/specs/g.yaml
    - .config/git/
    - .config/lazygit/
    # FIXME: mod.nu.tmpl loops on source directory
    - .config/nushell/modules/git.nu
  go:
    - .config/mise/default-go-packages
  goss:
    - .config/goss/
  gpg:
    - .gnupg/
  helix:
    - .config/helix/
  i3:
    - .config/Kvantum/
    - .config/X11/
    # - .config/autostart/
    - .config/gtk-*/
    - .config/i3*/
    - .config/picom/
    - .config/polybar/
    - .config/qt*ct/
    - .config/rofi/
    - .config/ulauncher/
    - .config/xdg-desktop-portal
    # - .local/bin/i3-*
    - .local/share/applications/
    - .xinitrc
    - .xprofile
  iterm2:
    - .local/share/iterm2/
    - Library/Application Support/iTerm2/
  kilo:
    - .config/kilo/
  logseq:
    - .chezmoiscripts/*setup-logseq.sh
    - .config/logseq/
    - .logseq/
  kube:
    - .config/carapace/specs/k.yaml
    - .config/k9s/
    - .config/krew/
    - .config/kube/
    - .local/bin/k
  lla:
    - .config/lla/
  mail:
    - .config/aerc/
    - .config/isync/
    - .config/meli/
    - .config/notmuch/
    - .config/systemd/user/mbsync-run.*
    - .local/share/applications/aerc.*
    - .local/share/applications/meli.*
  mise:
    # - .chezmoiscripts/{*,*/*}mise-install.sh
    - .chezmoiscripts/*install-mise.sh
    - .chezmoiscripts/*install-tools.sh
    - .config/carapace/specs/m.yaml
    - .config/mise/
  neovim:
    - .chezmoiscripts/*install-neovim.sh
    - .config/carapace/specs/n.yaml
    - .config/cspell/
    - .config/neovide/
    - .config/nvim/
    - .local/bin/nvim-*
    - .local/share/nvim
  node:
    - .config/mise/default-npm-packages
    - .config/npm/
  nushell:
    # - .config/*/*.nu
    - .config/nushell/
    - "*.nu"
  oage:
    - .config/oage/
  ollama:
    - .ollama/
  otel:
    - .config/otel/
    - .config/systemd/user/webhook.service
    - .config/webhook/
    - .local/bin/webhook-notify
    - Library/LaunchAgents/com.webhook.alert.*
  processCompose:
    - .config/process-compose/
    - .config/systemd/user/process-compose.*
    - .local/bin/pc
    - Library/LaunchAgents/com.process-compose.*
  # php: []
  python:
    - .chezmoiscripts/*install-python.sh
    - .config/mise/default-python-packages
  ruby:
    - .chezmoiscripts/*install-ruby.sh
    - .config/gem/
    - .config/mise/default-gems
  rust:
    - .chezmoiscripts/*install-rust.sh
  sheldon:
    - .config/sheldon/
  shpool:
    - .config/carapace/specs/s.yaml
    - .config/shpool/
    - .local/bin/shpool-*
    - .ssh/config.s/shpool.conf
  sql:
    - .config/psql/
  ssh:
    - .config/carapace/specs/srv.yaml
    - .config/srv/
    - .local/bin/srv
    - .local/bin/ssh-cd
    - .ssh/
  ripgrep:
    - .config/ripgrep/
  tailscale:
    - .config/tailscale/
  tmux:
    - .config/carapace/specs/t.yaml
    - .config/tmux/
    - .local/bin/t
  toolbox:
    - .config/toolbox/
  topgrade:
    # - .config/topgrade.d/
    - .config/topgrade/
  vim:
    - .config/carapace/specs/v.yaml
    - .config/vim/
    # - .vim/
    - .vimrc.local
  void:
    - .config/Void/
    - .void-editor/
  vscode:
    - .config/Code/
    # - .config/Code - OSS/
    # - .vscode-oss/
  vscodium:
    - .config/VSCodium/
  zellij:
    - .config/zellij/
  zoxide:
    - .config/zoxide/
